# =============================================================================
#  SPACE CLOUD V7 - NETWORKING & EXPOSURE LAYER
#  Description:
#  This manifest handles the "Ground-to-Space" communication link.
#  It defines three critical components:
#  1. A 'Service' (L4): Internal load balancer for the Guardian Dashboard.
#  2. An 'Ingress' (L7): HTTP gateway for the operator's browser.
#  3. A 'NodePort' (L4 UDP): The High-Bandwidth Telemetry Uplink.
# =============================================================================

# --- 1. INTERNAL SERVICE (The Virtual Anchor) ---
apiVersion: v1
kind: Service
metadata:
  name: space-dashboard-svc
spec:
  selector:
    app: space-mission
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP

---
# --- 2. INGRESS (The Space Gateway) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: space-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: space-dashboard-svc
                port:
                  number: 80

---
# --- 3. UDP TELEMETRY NODEPORT (The Data Link) ---
# Exposes the Phoenix payload's UDP listener to the outside world
# so data_streamer.py can beam the 120-channel tensor directly to it.
apiVersion: v1
kind: Service
metadata:
  name: space-telemetry-udp
spec:
  type: NodePort
  selector:
    app: space-mission
  ports:
    - name: udp-telemetry
      protocol: UDP
      port: 5005
      targetPort: 5005
      nodePort: 32005
