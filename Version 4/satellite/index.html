<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud v2.3 | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-space: #080a10;
            --panel-bg: rgba(20, 25, 40, 0.9);
            --neon-blue: #00f3ff;
            --neon-green: #00ff9d;
            --neon-red: #ff0055;
            --neon-yellow: #ffcc00;
            --text-muted: #8a9bb8;
            --orbit-path: rgba(0, 243, 255, 0.15);
        }

        body {
            background: radial-gradient(circle at center, #1a1f35 0%, var(--bg-space) 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 15px 30px;
            background: linear-gradient(90deg, rgba(0,243,255,0.1) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: 1.8rem;
        }
        h1 span { color: var(--neon-blue); }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; letter-spacing: 1px; }

        .connection-info {
            text-align: right;
            font-size: 0.9rem;
        }
        .info-label { color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; }
        .info-value { font-weight: 700; color: var(--neon-blue); letter-spacing: 1px; }
        .sidecar-status { color: var(--neon-green); font-weight: 600; }
        .sidecar-error { color: var(--neon-red); }

        /* --- MAIN LAYOUT --- */
        .main-container {
            flex: 1;
            display: flex;
            padding: 30px;
            gap: 30px;
            position: relative;
        }

        /* LEFT PANEL: ORBIT VISUALIZER */
        .orbit-panel {
            flex: 2;
            background: var(--panel-bg);
            border-radius: 20px;
            border: 1px solid rgba(0, 243, 255, 0.1);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }

        .earth {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe 80%, #080a10 100%);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(79, 172, 254, 0.6);
            z-index: 5;
            position: relative;
        }
        .earth::after {
            content: ''; position: absolute; top:0; left:0; right:0; bottom:0;
            border-radius: 50%;
            background: repeating-linear-gradient(transparent 0%, transparent 5%, rgba(255,255,255,0.05) 5%, rgba(255,255,255,0.05) 10%);
            animation: rotateEarth 60s linear infinite;
            opacity: 0.5;
        }

        .orbit-track {
            position: absolute;
            width: 500px;
            height: 500px;
            border: 2px dashed var(--orbit-path);
            border-radius: 50%;
        }

        /* ZONA ECLISSI: Gradiente conico per l'ombra */
        .eclipse-cone {
            position: absolute;
            width: 100%;
            height: 100%;
            background: conic-gradient(
                transparent 180deg,
                rgba(0,0,0,0.85) 180deg, 
                rgba(10,10,20,0.95) 210deg,
                rgba(0,0,0,0.85) 240deg,
                transparent 240deg
            );
            z-index: 1;
            pointer-events: none;
        }

        /* SATELLITE MARKERS */
        .marker-wrapper {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            transition: transform 1s linear; /* Movimento fluido */
            z-index: 10;
        }

        .sat-marker {
            position: absolute;
            width: 16px; height: 16px;
            background: var(--text-muted);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            /* Posiziona il marker a 250px dal centro (raggio dell'orbita) */
            top: -250px; 
            box-shadow: 0 0 5px rgba(255,255,255,0.3);
            transition: all 0.3s ease-out;
        }

        /* Satellite attivo (quello che ospita QUESTA dashboard) */
        .sat-marker.active-host {
            background: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green), 0 0 40px var(--neon-green);
            width: 22px; height: 22px;
            z-index: 20;
            animation: pulse 2s infinite;
        }

        /* Satellite in eclissi */
        .sat-marker.in-eclipse:not(.active-host) {
            background: #222;
            box-shadow: none;
            border: 1px solid #444;
        }

        /* RIGHT PANEL: TELEMETRY DATA */
        .data-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .node-card {
            background: linear-gradient(145deg, rgba(30,35,50,0.9), rgba(20,25,40,0.9));
            border-left: 3px solid var(--neon-blue);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .node-card.active-host {
            border-left-color: var(--neon-green);
            background: linear-gradient(145deg, rgba(0, 255, 157, 0.1), rgba(20,25,40,0.9));
        }
        .node-card.active-host::after {
            content: 'MISSION HOST';
            position: absolute; top: 10px; right: 10px;
            font-size: 0.7rem; font-weight: 700; color: var(--neon-green);
            letter-spacing: 1px;
        }

        .node-card.danger { border-left-color: var(--neon-red); }

        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .node-name { font-size: 1.2rem; font-weight: 700; letter-spacing: 1px; }
        
        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .metric-box .label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; }
        .metric-box .value { font-size: 1.4rem; font-weight: 700; }

        /* Utilities */
        .text-green { color: var(--neon-green); }
        .text-red { color: var(--neon-red); }
        .text-blue { color: var(--neon-blue); }

        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); opacity: 1; } 50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes rotateEarth { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-space); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 3px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Space Cloud <span>v2.3</span></h1>
            <div class="subtitle">MPC Autonomous Orchestration | Sidecar Memory</div>
        </div>
        <div class="connection-info">
            <div style="margin-bottom: 5px;">
                <span class="info-label">Active Host Satellite:</span><br>
                <span id="active-node-display" class="info-value">SEARCHING...</span>
            </div>
            <div>
                <span class="info-label">Local Sidecar Memory:</span> 
                <span id="sidecar-status" class="sidecar-status">CHECKING...</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="orbit-panel">
            <div class="orbit-track">
                <div class="eclipse-cone"></div> </div>
            <div class="earth"></div>
            
            <div style="position: absolute; bottom: 20px; left: 30px; font-size: 0.8rem; color: var(--text-muted);">
                <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 5px;">
                    <div style="width: 12px; height: 12px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 10px var(--neon-green);"></div>
                    <span>Active Mission Payload</span>
                </div>
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div style="width: 12px; height: 12px; background: #222; border: 1px solid #555; border-radius: 50%;"></div>
                    <span>Eclipse Zone (180°-240°)</span>
                </div>
            </div>
        </div>

        <div class="data-panel" id="fleet-list">
            </div>
    </div>

    <script>
        // === CONFIGURAZIONE ===
        const ECLIPSE_START = 180;
        const ECLIPSE_END = 240;

        async function updateDashboard() {
            try {
                const res = await fetch('/api/telemetry');
                const data = await res.json();

                // 1. Aggiorna Header Info
                const myNodeName = data.pod_info.node || 'Unknown';
                document.getElementById('active-node-display').textContent = myNodeName.replace('space-cloud-', '').toUpperCase();
                
                const sidecarEl = document.getElementById('sidecar-status');
                sidecarEl.textContent = data.pod_info.memory_status;
                sidecarEl.className = data.pod_info.memory_status.includes('ONLINE') ? 'sidecar-status' : 'sidecar-error';

                // 2. Riferimenti DOM
                const listEl = document.getElementById('fleet-list');
                const trackEl = document.querySelector('.orbit-track');

                // Pulizia (metodo semplice per reset)
                listEl.innerHTML = '';
                // Rimuovi solo i marker, non l'ombra conica
                Array.from(trackEl.children).forEach(c => {
                    if (c.classList.contains('marker-wrapper')) c.remove();
                });

                // Se non c'è telemetria, mostra messaggio
                if (!data.fleet || Object.keys(data.fleet).length === 0) {
                    listEl.innerHTML = '<div style="text-align:center; color: var(--text-muted); margin-top: 50px;">Waiting for System Bus Telemetry...<br>Make sure physics_sim.py is running.</div>';
                    return;
                }

                // 3. Generazione Elementi
                const sortedNodes = Object.keys(data.fleet).sort();
                sortedNodes.forEach(nodeName => {
                    const sat = data.fleet[nodeName];
                    const isMyHost = (nodeName === myNodeName);
                    const shortName = nodeName.replace('space-cloud-', '').toUpperCase().replace('CONTROL-PLANE', 'MASTER');

                    // --- A. CREAZIONE CARD TELEMETRIA ---
                    let cardClass = 'node-card';
                    if (isMyHost) cardClass += ' active-host';
                    if (sat.eclipse || sat.battery < 30) cardClass += ' danger';

                    let battColor = 'text-blue';
                    if (sat.battery < 50) battColor = 'text-yellow';
                    if (sat.battery < 30) battColor = 'text-red';

                    const card = document.createElement('div');
                    card.className = cardClass;
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="node-name">${shortName}</div>
                            <div style="font-size: 1.2rem;">${sat.eclipse ? '🌑' : '☀️'}</div>
                        </div>
                        <div class="metrics-grid">
                            <div class="metric-box">
                                <div class="label">Battery Level</div>
                                <div class="value ${battColor}">${sat.battery.toFixed(0)}%</div>
                            </div>
                            <div class="metric-box">
                                <div class="label">Temperature</div>
                                <div class="value">${sat.temp.toFixed(1)}°C</div>
                            </div>
                        </div>
                        <div style="margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); text-align: right;">
                            Orbit Angle: ${sat.angle}° | Status: ${sat.status}
                        </div>
                    `;
                    listEl.appendChild(card);

                    // --- B. CREAZIONE MARKER ORBITALE ---
                    const wrapper = document.createElement('div');
                    wrapper.className = 'marker-wrapper';
                    // Ruota il contenitore per posizionare il marker lungo il cerchio
                    wrapper.style.transform = `rotate(${sat.angle}deg)`;

                    const marker = document.createElement('div');
                    let markerClass = 'sat-marker';
                    if (isMyHost) markerClass += ' active-host';
                    if (sat.eclipse) markerClass += ' in-eclipse';
                    marker.className = markerClass;

                    // Aggiungi tooltip nativo
                    marker.title = `${shortName} (B:${sat.battery.toFixed(0)}% T:${sat.temp.toFixed(1)}°)`;

                    wrapper.appendChild(marker);
                    trackEl.appendChild(wrapper);
                });

            } catch (e) {
                console.error("Dashboard update error:", e);
            }
        }

        // Aggiorna ogni secondo per fluidità
        setInterval(updateDashboard, 1000);
        updateDashboard(); // Prima chiamata immediata
    </script>
</body>
</html>
