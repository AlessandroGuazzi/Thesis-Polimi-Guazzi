<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette Modern Space */
            --bg-deep: #050b14;
            --surface: rgba(16, 28, 45, 0.7);
            --border: rgba(64, 169, 255, 0.15);
            
            --primary: #00f3ff;       /* Ciano Elettrico */
            --success: #00ff9d;       /* Verde Mentale */
            --warning: #ffb800;       /* Ambra Solare */
            --danger: #ff0055;        /* Rosso Allarme */
            --text-main: #ffffff;
            --text-dim: #647b94;
        }

        body { 
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            margin: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
            
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
        }

        body::before {
            content: ""; position: absolute; inset: 0;
            background: radial-gradient(circle at center, transparent 30%, #020408 100%);
            pointer-events: none; z-index: 0;
        }

        .dashboard-wrapper { 
            display: flex; gap: 30px; z-index: 10; padding: 40px; 
            backdrop-filter: blur(5px);
        }

        .col { display: flex; flex-direction: column; gap: 25px; }

        /* --- CARD DESIGN --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px; 
            width: 360px; 
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
            transition: transform 0.3s ease;
        }

        .card::after {
            content: ""; position: absolute; top: -1px; right: -1px;
            width: 30px; height: 30px;
            border-top: 3px solid var(--primary); border-right: 3px solid var(--primary);
            border-radius: 0 12px 0 0; opacity: 0.6;
        }

        h1 { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 14px; 
            letter-spacing: 4px; 
            color: var(--text-dim); 
            margin: 0 0 25px 0; 
            text-transform: uppercase; 
            font-weight: 700;
            display: flex; align-items: center; gap: 10px;
        }
        h1::before { content:"//"; color: var(--primary); }

        /* --- METRICS --- */
        .metrics-row { display: flex; justify-content: space-between; align-items: flex-end; }
        .metric-group { display: flex; flex-direction: column; }
        
        .metric-big { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 64px; 
            line-height: 1;
            font-weight: 600; 
            color: var(--text-main); 
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }
        
        .label { 
            font-size: 10px; 
            color: var(--text-dim); 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-bottom: 5px;
        }

        /* --- STATUS BAR --- */
        .status-bar {
            margin-top: 25px; padding: 12px 15px; 
            background: rgba(0,0,0,0.3); border-radius: 6px; 
            display: flex; align-items: center; border: 1px solid rgba(255,255,255,0.05);
        }
        .led { width: 8px; height: 8px; border-radius: 50%; margin-right: 12px; box-shadow: 0 0 8px currentColor; }

        /* --- ORBIT VISUALIZATION --- */
        .orbit-container {
            width: 240px; height: 240px; margin: 10px auto; position: relative;
            border-radius: 50%; 
            border: 1px dashed rgba(255, 255, 255, 0.1);
            background: radial-gradient(circle, transparent 55%, rgba(0, 243, 255, 0.03) 70%);
        }

        .earth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #295bbb, #081224);
            box-shadow: 0 0 40px rgba(41, 91, 187, 0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; z-index: 1; border: 1px solid rgba(64, 169, 255, 0.3);
        }
        .earth::after {
            content: "EARTH"; position: absolute; font-family: 'Rajdhani'; font-size: 8px; 
            letter-spacing: 2px; color: var(--primary); top: 50%; left: 50%; transform: translate(-50%, -50%);
            opacity: 0.7;
        }

        /* Ombra a DESTRA */
        .orbit-shadow {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
            border-radius: 0 120px 120px 0;
            pointer-events: none; z-index: 0;
        }

        .sat-dot {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transition: transform 1.2s linear; z-index: 2;
        }

        .dot-body {
            width: 10px; height: 10px; background: #fff; border-radius: 50%;
            margin: -5px auto 0; box-shadow: 0 0 15px #fff;
            position: relative;
        }

        .dot-body.active-node { background: var(--success); box-shadow: 0 0 15px var(--success); }
        .dot-body.active-node::before {
            content: ''; position: absolute; inset: -10px; border: 1px solid var(--success);
            border-radius: 50%; animation: ping 2s infinite; opacity: 0.5;
        }
        @keyframes ping { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        /* Pallino Rosso per nodo guasto */
        .dot-body.fault-node { background: var(--danger); box-shadow: 0 0 15px var(--danger); }

        .dot-label {
            position: absolute; top: -20px; width: 100%; text-align: center;
            font-size: 9px; font-weight: 700; color: var(--primary); letter-spacing: 1px;
        }

        /* --- FLEET LIST --- */
        .fleet-container { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        
        .sat-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-radius: 8px;
            background: rgba(255,255,255,0.02); 
            border: 1px solid transparent;
            transition: all 0.3s;
        }
        
        .sat-row.is-active {
            background: rgba(0, 243, 255, 0.05);
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.05);
        }

        /* Stile riga per nodo guasto */
        .sat-row.is-fault {
            border-color: rgba(255, 0, 85, 0.3);
            background: rgba(255, 0, 85, 0.05);
        }

        .badge { 
            font-size: 9px; padding: 4px 8px; border-radius: 4px; 
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }
        .bg-sun { background: rgba(255, 184, 0, 0.2); color: var(--warning); border: 1px solid rgba(255, 184, 0, 0.3); }
        .bg-dark { background: rgba(100, 123, 148, 0.2); color: var(--text-dim); border: 1px solid rgba(100, 123, 148, 0.3); }

        .batt-val { font-family: 'Rajdhani'; font-size: 18px; font-weight: 700; }

        /* Host Lock Text - FONT CAMBIATO */
        .host-lock {
            font-family: 'Barlow', sans-serif; /* Font pulito */
            font-size: 14px; 
            font-weight: 500;
            color: var(--primary); 
            line-height: 1.4; 
            opacity: 0.9;
            letter-spacing: 0.5px;
        }

    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="col">
            
            <div class="card">
                <h1>Mission Control</h1>
                <div class="metrics-row">
                    <div class="metric-group">
                        <div class="label">ACTIVE REPLICAS</div>
                        <div class="metric-big" id="replica-count">-</div>
                    </div>
                    <div class="metric-group" style="text-align: right;">
                        <div class="label">PROCESSED DATA</div>
                        <div class="metric-big" style="color:var(--primary)" id="data-counter">---</div>
                    </div>
                </div>
                <div class="status-bar">
                    <div id="status-led" class="led" style="background: #555; color: #555;"></div>
                    <div class="label" id="status-msg" style="margin:0; color: var(--text-main);">INITIALIZING LINK...</div>
                </div>
            </div>

            <div class="card">
                <h1>Orbital Tracking</h1>
                <div class="orbit-container">
                    <div class="orbit-shadow"></div>
                    <div class="earth"></div>
                    <div id="orbit-layer"></div>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px; padding: 0 10px;">
                    <div class="label" style="color:var(--warning)">☀ SUN</div>
                    <div class="label" style="color:var(--text-dim)">ECLIPSE 🌑</div>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card" style="height: 100%;">
                <h1>Constellation Telemetry</h1>
                
                <div style="margin-bottom: 25px; padding-bottom: 20px; border-bottom: 1px solid var(--border);">
                    <div class="label" style="margin-bottom: 10px;">ACTIVE HOST NODE</div>
                    <div class="host-lock" id="pod-name">SCANNING NETWORK...</div>
                </div>

                <div class="fleet-container" id="fleet-list">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const replicaEl = document.getElementById('replica-count');
        const counterEl = document.getElementById('data-counter');
        const statusEl = document.getElementById('status-msg');
        const statusLed = document.getElementById('status-led');
        const podEl = document.getElementById('pod-name');
        const fleetList = document.getElementById('fleet-list');
        const orbitLayer = document.getElementById('orbit-layer');

        async function update() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                counterEl.innerText = data.count; 
                
                // Stato Missione
                if (data.mission_control) {
                    replicaEl.innerText = data.mission_control.replicas;
                    statusEl.innerText = data.mission_control.message;
                    
                    if (data.mission_control.replicas == "0") {
                        replicaEl.style.color = "var(--danger)";
                        statusEl.style.color = "var(--danger)";
                        statusLed.style.color = "var(--danger)";
                        statusLed.style.background = "var(--danger)";
                    } else {
                        replicaEl.style.color = "var(--text-main)";
                        statusEl.style.color = "var(--success)";
                        statusLed.style.color = "var(--success)";
                        statusLed.style.background = "var(--success)";
                    }
                }
                
                podEl.innerText = `${data.satellite_pod} @ ${data.satellite_node}`;
                podEl.style.color = "var(--primary)";

                // Render Flotta
                fleetList.innerHTML = '';
                orbitLayer.innerHTML = '';
                
                const satNames = Object.keys(data.fleet || {}).sort();
                satNames.forEach(name => {
                    const sat = data.fleet[name];
                    const isActiveNode = (name === data.satellite_node);
                    const isFaulty = (sat.health === 'OFFLINE' || sat.health === 'UNKNOWN');
                    
                    // Colori Dinamici Batteria
                    let battColor = "var(--success)";
                    if(sat.battery < 40) battColor = "var(--warning)";
                    if(sat.battery < 20) battColor = "var(--danger)";
                    if(isFaulty) battColor = "var(--text-dim)";

                    // Card Satellite
                    const rowHtml = `
                        <div class="sat-row ${isActiveNode ? 'is-active' : ''} ${isFaulty ? 'is-fault' : ''}">
                            <div>
                                <div style="font-family:'Rajdhani'; font-weight:700; font-size:16px; color: ${isActiveNode ? 'var(--primary)' : 'var(--text-main)'}">
                                    ${name.replace('space-cloud-', '').toUpperCase()}
                                </div>
                                <div style="display:flex; gap:6px; margin-top:6px;">
                                    <span class="badge ${sat.phase === 'SUN' ? 'bg-sun' : 'bg-dark'}">${sat.phase}</span>
                                    ${isFaulty ? '<span class="badge" style="background:var(--danger); color:#fff">HARDWARE FAILURE</span>' : ''}
                                </div>
                            </div>
                            <div style="text-align:right">
                                <div class="batt-val" style="color:${battColor}">${isFaulty ? 'ERR' : sat.battery + '%'}</div>
                                <div class="label" style="margin-top:2px;">${sat.load}</div>
                            </div>
                        </div>`;
                    fleetList.innerHTML += rowHtml;

                    // Dot Orbita
                    const rotation = (sat.orbit_pos * 360) + 180; 
                    const dot = document.createElement('div');
                    dot.className = 'sat-dot';
                    dot.style.transform = `rotate(${rotation}deg)`;
                    
                    let activeClass = '';
                    let dotColor = '#fff';

                    if (isActiveNode) {
                        activeClass = 'active-node';
                        dotColor = 'var(--success)';
                    } else if (isFaulty) {
                        activeClass = 'fault-node'; // Nuova classe CSS definita sopra
                        dotColor = 'var(--danger)';
                    }
                    
                    dot.innerHTML = `
                        <div class="dot-body ${activeClass}" style="background-color: ${dotColor}"></div>
                        <div class="dot-label">${name.replace('space-cloud-', 'SAT ')}</div>
                    `;
                    orbitLayer.appendChild(dot);
                });

            } catch (e) {
                statusEl.innerText = "SIGNAL LOST // HIBERNATION MODE";
                statusEl.style.color = "var(--danger)";
                statusLed.style.background = "var(--danger)";
                replicaEl.innerText = "0";
                podEl.innerText = "LINK DISCONNECTED";
                podEl.style.color = "var(--text-dim)";
            }
        }
        setInterval(update, 1000);
        update(); 
    </script>
</body>
</html>
