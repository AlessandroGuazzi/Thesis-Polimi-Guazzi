<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud V3 | Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050a10;
            --panel-bg: rgba(13, 20, 35, 0.85);
            --panel-border: rgba(0, 243, 255, 0.15);
            
            --primary: #00f3ff;       
            --master: #ffd700;        
            --replica: #a855f7;       
            --danger: #ff2a6d;        
            
            --sun-color: #ffb800;
            --eclipse-color: #1e293b;

            --font-head: 'Rajdhani', sans-serif;
            --font-body: 'Barlow', sans-serif;
        }

        * { box-sizing: border-box; }

        body { 
            background-color: var(--bg-deep);
            color: #fff;
            font-family: var(--font-body);
            margin: 0; height: 100vh; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 40, 80, 0.2) 0%, transparent 70%);
        }

        .hud-container {
            width: 1400px; height: 800px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 40px;
            position: relative;
        }

        /* --- ORBITA (Sinistra) --- */
        .orbit-section {
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }

        .orbit-system {
            width: 650px; height: 650px;
            position: relative;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                rgba(255, 215, 0, 0.1) 0deg, 
                rgba(255, 215, 0, 0.1) 180deg, 
                rgba(0, 5, 20, 0.8) 180deg, 
                rgba(0, 5, 20, 0.8) 360deg
            );
            border: 1px dashed rgba(255,255,255,0.15);
            box-shadow: 0 0 100px rgba(0, 243, 255, 0.03);
        }

        .earth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border-radius: 50%;
            background: radial-gradient(circle at 40% 40%, #2563eb, #0f172a);
            box-shadow: inset -40px -40px 80px rgba(0,0,0,0.8), 0 0 40px rgba(37, 99, 235, 0.2);
            z-index: 10;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .earth::after { content: "EARTH"; font-family: var(--font-head); font-size: 14px; letter-spacing: 3px; color: rgba(255,255,255,0.5); font-weight: 700; }

        .zone-label {
            position: absolute; font-family: var(--font-head); font-weight: 700; letter-spacing: 2px; font-size: 14px;
        }
        .lbl-sun { top: 50%; right: -80px; transform: translateY(-50%) rotate(90deg); color: var(--sun-color); text-shadow: 0 0 15px var(--sun-color); }
        .lbl-ecl { top: 50%; left: -80px; transform: translateY(-50%) rotate(-90deg); color: #475569; }

        /* Satelliti */
        .sat-marker-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            transition: transform 1s linear; 
        }
        .sat-marker {
            width: 18px; height: 18px; border-radius: 50%;
            margin: -9px auto 0; 
            position: relative; z-index: 20;
            border: 2px solid var(--bg-deep);
            box-shadow: 0 0 15px currentColor;
        }

        /* --- SIDEBAR (Destra) --- */
        .sidebar { display: flex; flex-direction: column; gap: 20px; height: 100%; }

        .panel {
            background: var(--panel-bg); border: 1px solid var(--panel-border);
            border-radius: 8px; padding: 20px; display: flex; flex-direction: column;
            backdrop-filter: blur(10px);
        }

        .panel-header {
            font-family: var(--font-head); font-size: 14px; letter-spacing: 2px; color: var(--primary);
            text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 15px;
            display: flex; justify-content: space-between;
        }

        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-val { font-family: var(--font-head); font-size: 42px; font-weight: 700; color: #fff; line-height: 1; }
        .stat-lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        .fleet-list { flex: 1; overflow-y: auto; padding-right: 5px; display: flex; flex-direction: column; gap: 10px; }
        
        .node-card {
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center;
            transition: transform 0.2s;
        }
        
        .role-master { border-left: 3px solid var(--master); }
        .role-dash { border-left: 3px solid var(--primary); }
        .role-replica { border-left: 3px solid var(--replica); }
        .role-off { border-left: 3px solid var(--danger); opacity: 0.5; }

        .node-name { font-family: var(--font-head); font-weight: 700; font-size: 15px; display: block; }
        .node-meta { font-size: 10px; color: #94a3b8; display: flex; gap: 6px; margin-top: 4px; }
        .badge { padding: 1px 5px; border-radius: 3px; font-weight: 700; text-transform: uppercase; }
        .bg-sun { background: var(--sun-color); color: #000; }
        .bg-ecl { border: 1px solid #475569; color: #94a3b8; }

    </style>
</head>
<body>

    <div class="hud-container">
        
        <div class="orbit-section">
            <div class="orbit-system">
                <div class="zone-label lbl-sun">SUNLIGHT</div>
                <div class="zone-label lbl-ecl">ECLIPSE</div>
                <div class="earth"></div>
                <div id="orbit-layer"></div>
            </div>
        </div>

        <div class="sidebar">
            <div class="panel">
                <div class="panel-header"><span>Mission Control</span> <span style="color:var(--success)">LIVE</span></div>
                <div class="stat-row">
                    <div><span class="stat-lbl">Ops / Cycle</span><div class="stat-val" id="data-counter" style="color:var(--primary)">---</div></div>
                    <div style="text-align:right"><span class="stat-lbl">Replicas</span><div class="stat-val" id="replica-count" style="color:var(--master)">1</div></div>
                </div>
                <div style="background:rgba(0,243,255,0.05); padding:10px; border-left:2px solid var(--primary); border-radius:4px;">
                    <div class="stat-lbl" style="color:var(--primary)">UPLINK HOST</div>
                    <div id="pod-name" style="font-family:var(--font-head); font-weight:700; margin-top:2px;">SCANNING...</div>
                </div>
            </div>

            <div class="panel" style="flex:1; overflow:hidden;">
                <div class="panel-header"><span>Fleet Status</span> <span id="fleet-count">0 NODES</span></div>
                <div class="fleet-list" id="fleet-list"></div>
                <div style="text-align:center; font-size:10px; color:var(--master); margin-top:10px; opacity:0.7; letter-spacing:1px;">REDIS MESH ACTIVE</div>
            </div>
        </div>

    </div>

    <script>
        const els = {
            cnt: document.getElementById('data-counter'),
            rep: document.getElementById('replica-count'),
            pod: document.getElementById('pod-name'),
            list: document.getElementById('fleet-list'),
            orb: document.getElementById('orbit-layer'),
            fc: document.getElementById('fleet-count')
        };

        async function update() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                els.cnt.innerText = data.count;
                if(data.mission_control) els.rep.innerText = data.mission_control.replicas;
                els.pod.innerText = data.satellite_pod;

                els.list.innerHTML = '';
                els.orb.innerHTML = '';
                
                const names = Object.keys(data.fleet || {}).sort();
                els.fc.innerText = `${names.length} TRACKING`;

                names.forEach(name => {
                    const sat = data.fleet[name];
                    const isMyHost = (name === data.satellite_node);
                    
                    // --- MODIFICA LOGICA COLORI ---
                    let rClass='role-off', rTxt='OFF', color='var(--danger)', z=10;

                    if (sat.health !== 'OFFLINE') {
                        // Priorità 1: MASTER (Giallo)
                        if (sat.role === 'MASTER') { 
                            rClass='role-master'; rTxt='MASTER'; color='var(--master)'; z=50; 
                        }
                        // Priorità 2: REPLICA (Viola) - Ora viene prima della Dashboard
                        else if (sat.role === 'REPLICA') { 
                            rClass='role-replica'; rTxt='REPLICA'; color='var(--replica)'; z=30;
                        }
                        // Priorità 3: DASHBOARD (Blu) - Solo se non è né Master né Replica
                        else if (sat.load === 'COMPUTE') { 
                            rClass='role-dash'; rTxt='DASHBOARD'; color='var(--primary)'; z=40; 
                        }
                    }

                    const isSun = sat.phase === 'SUN';
                    const badge = isSun ? `<span class="badge bg-sun">SUN</span>` : `<span class="badge bg-ecl">ECL</span>`;
                    
                    // Se sono io, aggiungo (YOU) indipendentemente dal colore
                    const youTag = isMyHost ? ' <span style="color:var(--primary); font-size:12px;">(YOU)</span>' : '';

                    // Card
                    els.list.innerHTML += `
                        <div class="node-card ${rClass}">
                            <div>
                                <span class="node-name">${name.replace('space-cloud-','').toUpperCase()} ${youTag}</span>
                                <div class="node-meta">${badge} <span>${rTxt}</span></div>
                            </div>
                            <div style="font-family:var(--font-head); font-weight:700; font-size:18px; color:${sat.battery<30?'var(--danger)':'#fff'}">
                                ${sat.battery.toFixed(0)}%
                            </div>
                        </div>`;

                    // Orbit Marker
                    const rot = sat.orbit_pos * 360;
                    const mkBox = document.createElement('div');
                    mkBox.className = 'sat-marker-container';
                    mkBox.style.transform = `rotate(${rot}deg)`;
                    mkBox.style.zIndex = z;
                    
                    const mk = document.createElement('div');
                    mk.className = 'sat-marker';
                    mk.style.backgroundColor = color;
                    if(isMyHost) mk.style.boxShadow = `0 0 20px ${color}`;
                    
                    mkBox.appendChild(mk);
                    els.orb.appendChild(mkBox);
                });

            } catch(e) { console.log(e); }
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
