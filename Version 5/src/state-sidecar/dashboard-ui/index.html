<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud V5 - Mission Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ios-bg: #F5F5F7; --ios-card: #FFFFFF; --ios-text: #1D1D1F; --ios-subtext: #86868B;
            --ios-border: #E5E5EA; --blue: #007AFF; --green: #34C759; --orange: #FF9500; --red: #FF3B30; --purple: #AF52DE;
            --radius-l: 24px; --radius-m: 20px;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.03);
        }

        body { margin: 0; padding: 0; background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; height: 100vh; display: flex; flex-direction: column; color: var(--ios-text); overflow: hidden; }

        /* HEADER V5 */
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--ios-border); z-index: 100; }
        .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; gap: 10px; align-items: center; }
        .pill-stack { display: flex; gap: 12px; }
        .pill { background: var(--ios-bg); padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--ios-subtext); display: flex; gap: 8px; align-items: center; border: 1px solid transparent; }

        /* Nuovi stili per metriche AI */
        .pill.ai-metric { background: #Fbf5ff; color: var(--purple); border-color: rgba(175, 82, 222, 0.2); }
        .pill-val { color: var(--ios-text); font-weight: 700; font-feature-settings: "tnum"; }
        .ai-val { color: var(--purple); font-weight: 700; font-feature-settings: "tnum"; }

        #mission-clock { font-family: monospace; font-size: 16px; color: var(--ios-text); }

        /* LAYOUT */
        .content-split { display: grid; grid-template-columns: 420px 1fr; gap: 32px; padding: 32px; height: 100%; overflow: hidden; }

        /* RADAR & CARDS (Invariati o adattati) */
        .radar-panel { background: #E8E8ED; border-radius: var(--radius-l); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5); }
        .orbit-track { width: 280px; height: 280px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.6); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .earth-3d { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; transform: translate(-50%, -50%); background: radial-gradient(circle at 30% 30%, #5AC8FA, #007AFF); border-radius: 50%; z-index: 10; }
        .night-slice { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; border-radius: 50%; filter: blur(20px); z-index: 0; background: conic-gradient(transparent 0deg 220deg, rgba(0,0,0,0.5) 220deg 320deg, transparent 320deg 360deg); }
        .sat-arm { position: absolute; top: 0; left: 50%; width: 0; height: 50%; transform-origin: bottom center; z-index: 20; transition: transform 1s linear; }
        .sat-tag { position: absolute; top: 0; left: 0; width: 36px; height: 36px; background: white; border-radius: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #1D1D1F; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .sat-tag.active { background: var(--blue); color: white; transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4); z-index: 30; }

        .cards-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; overflow-y: auto; padding: 10px; }
        .apple-card { background: var(--ios-card); border-radius: var(--radius-m); padding: 32px; box-shadow: var(--shadow-soft); display: flex; flex-direction: column; justify-content: space-between; transition: border-color 0.2s; }
        .apple-card.active-node { border: 2px solid rgba(0, 122, 255, 0.2); background: #F2F8FF; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .node-h1 { font-size: 22px; font-weight: 700; }
        .node-sub { font-size: 13px; font-weight: 500; color: var(--ios-subtext); margin-top: 4px;}
        .meter-box { margin-bottom: 24px; }
        .meter-label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--ios-subtext); margin-bottom: 8px; }
        .track { height: 12px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
        .forecast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .f-item { display: flex; flex-direction: column; gap: 4px; }
        .f-head { font-size: 11px; font-weight: 700; color: #98989D; text-transform: uppercase; }
        .f-stat { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

        /* OVERLAYS */
        #mig-overlay, #loader-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .mig-box { background: white; padding: 40px; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; border: 1px solid rgba(0,0,0,0.05); min-width: 320px; }
        .loader-spinner { width: 40px; height: 40px; border: 4px solid #E5E5EA; border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader-overlay" style="display:flex;">
        <div class="loader-spinner"></div>
        <div style="font-weight:600; color:var(--ios-subtext);">CONNECTING TO GUARDIAN...</div>
    </div>

    <div id="mig-overlay">
        <div class="mig-box">
            <div style="font-size:48px; margin-bottom:16px;">✨</div>
            <h2 style="margin:0 0 8px 0;">Teleporting State</h2>
            <p style="color:var(--ios-subtext); margin:0;">Injecting RAM into new satellite...</p>
        </div>
    </div>

    <header>
        <div class="brand">
            <span style="font-size:24px;">🛰️</span> SpaceCloud V5
        </div>
        <div class="pill-stack">
            <div class="pill">NODE <span class="pill-val" id="active-node" style="color:var(--blue)">--</span></div>
            <div class="pill ai-metric">EPOCH <span class="ai-val" id="ai-epoch">0</span></div>
            <div class="pill ai-metric">ACC <span class="ai-val" id="ai-acc">0%</span></div>

            <div class="pill"><span id="mission-clock">T+0s</span></div>
        </div>
    </header>

    <div class="content-split">
        <div class="radar-panel">
            <div class="orbit-track">
                <div class="earth-3d"></div> <div class="night-slice"></div> <div id="sat-layer"></div>
            </div>
            <div style="position:absolute; bottom:30px; font-size:11px; font-weight:700; color:var(--ios-subtext); letter-spacing:1px;">LIVE ORBIT TELEMETRY</div>
        </div>
        <div class="cards-list" id="dashboard-content"></div>
    </div>

    <script>
        const REFRESH_RATE = 250;
        const C = { blue: '#007AFF', green: '#34C759', orange: '#FF9500', red: '#FF3B30', gray: '#8E8E93' };

        function getBatColor(v) { return v > 50 ? C.green : (v > 25 ? C.orange : C.red); }
        function getTempColor(v) { return v < 50 ? C.blue : (v < 85 ? C.orange : C.red); }

        function getTrendAnalysis(current, forecast, type) {
            if (current === undefined || forecast === undefined) return { arrow: '-', color: C.gray };
            const delta = forecast - current;
            if (Math.abs(delta) < 0.1) return { arrow: '•', color: C.green };
            const arrow = delta >= 0 ? '↗' : '↘';
            let color = C.gray;
            if (type === 'temp') {
                if (current < 0 && delta > 0) color = C.green;
                else if (current > 50 && delta < 0) color = C.green;
                else if (current > 40 && delta > 0) color = C.red;
            } else if (type === 'bat') {
                if (delta > 0) color = C.green;
                else if (current < 30 && delta < 0) color = C.red;
            }
            return { arrow, color };
        }

        let hasConnectedOnce = false;

        async function masterLoop() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 1000);

            try {
                const res = await fetch(`/api/telemetry?t=${Date.now()}`, { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!res.ok) throw new Error("Server Error");

                const data = await res.json();
                hasConnectedOnce = true;

                if (data.flight_mode === true) {
                    showMigrationUI();
                } else {
                    showOrbitUI();
                    updateDashboard(data);
                }
            } catch (e) {
                if (!hasConnectedOnce) {
                    document.getElementById('loader-overlay').style.display = 'flex';
                    document.getElementById('mig-overlay').style.display = 'none';
                } else {
                    showMigrationUI();
                }
            }
            setTimeout(masterLoop, REFRESH_RATE);
        }

        function showMigrationUI() {
            document.getElementById('mig-overlay').style.display = 'flex';
            document.getElementById('loader-overlay').style.display = 'none';
        }
        function showOrbitUI() {
            document.getElementById('mig-overlay').style.display = 'none';
            document.getElementById('loader-overlay').style.display = 'none';
        }

        function updateDashboard(data) {
            // Aggiorna Timer
            document.getElementById('mission-clock').innerText = `T+${data.internal_state.mission_timer || 0}s`;

            // === UPDATE V5: AI METRICS ===
            // Legge i dati che il Payload ha inviato al Guardian
            const epoch = data.internal_state.epoch || 0;
            const acc = (data.internal_state.accuracy || 0) * 100;

            document.getElementById('ai-epoch').innerText = epoch;
            document.getElementById('ai-acc').innerText = acc.toFixed(1) + '%';

            // Aggiorna Flotta Fisica
            if (data.environment && data.environment.status !== "NO_DATA") {
                renderFleet(data.environment);
            }
        }

        function renderFleet(fleet) {
            const grid = document.getElementById('dashboard-content');
            const orbit = document.getElementById('sat-layer');
            grid.innerHTML = ''; orbit.innerHTML = '';

            let activeName = "Scanning...";
            Object.keys(fleet).sort().forEach(name => {
                const sat = fleet[name];
                if (typeof sat !== 'object') return;
                const active = sat.is_working;
                if(active) activeName = name;

                if(sat.type !== 'ground') {
                    const arm = document.createElement('div');
                    arm.className = 'sat-arm';
                    arm.style.transform = `rotate(${sat.angle}deg)`;
                    const tag = document.createElement('div');
                    tag.className = `sat-tag ${active ? 'active' : ''}`;
                    tag.innerText = name.split('-').pop().replace('m','');
                    arm.appendChild(tag);
                    orbit.appendChild(arm);
                }

                const batTrend = getTrendAnalysis(sat.battery, sat.forecast?.bat_60s, 'bat');
                const tempTrend = getTrendAnalysis(sat.temp, sat.forecast?.temp_60s, 'temp');

                const html = `
                <div class="apple-card ${active ? 'active-node' : ''}">
                    <div class="card-header">
                        <div>
                            <div class="node-h1">${name}</div>
                            <div class="node-sub">${sat.type === 'ground' ? 'Ground Control' : (sat.eclipse ? 'Dark Side 🌑' : 'Sunlight ☀️')}</div>
                        </div>
                        <div class="status-dot"></div>
                    </div>
                    <div class="meter-box">
                        <div class="meter-label"><span>Battery</span><span class="meter-val" style="color:${getBatColor(sat.battery)}">${sat.battery.toFixed(0)}%</span></div>
                        <div class="track"><div class="fill" style="width:${sat.battery}%; background:${getBatColor(sat.battery)}"></div></div>
                    </div>
                    <div class="meter-box">
                        <div class="meter-label"><span>Core Temp</span><span class="meter-val" style="color:${getTempColor(sat.temp)}">${sat.temp.toFixed(0)}°C</span></div>
                        <div class="track"><div class="fill" style="width:${Math.min(100, Math.max(0, (sat.temp+50)/1.5))}%; background:${getTempColor(sat.temp)}"></div></div>
                    </div>
                    <div class="forecast-grid">
                        <div class="f-item"><span class="f-head">60s Power</span><span class="f-stat" style="color:${batTrend.color}">${batTrend.arrow} ${sat.forecast?.bat_60s}%</span></div>
                        <div class="f-item"><span class="f-head">60s Thermal</span><span class="f-stat" style="color:${tempTrend.color}">${tempTrend.arrow} ${sat.forecast?.temp_60s}°</span></div>
                    </div>
                </div>`;
                grid.insertAdjacentHTML('beforeend', html);
            });
            document.getElementById('active-node').innerText = activeName;
        }

        masterLoop();
    </script>
</body>
</html>
