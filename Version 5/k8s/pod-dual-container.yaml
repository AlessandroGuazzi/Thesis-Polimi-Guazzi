# =============================================================================
#  SPACE CLOUD V5.2 - KUBERNETES MISSION DEPLOYMENT
#  Description:
#  This manifest defines the "Dual-Container Pod" architecture. It orchestrates
#  the co-location of the 'Sidecar Guardian' (Stateful/Persistent) and the
#  'Payload Phoenix' (Stateless/Compute).
#  Crucially, it configures the security contexts and host-path volumes
#  required for CRIU (Checkpoint/Restore In Userspace) to capture and
#  reanimate the memory state during inter-satellite migrations.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-mission
  labels:
    app: space-mission
spec:
  # The system is designed for high-availability via migration,
  # so we keep 1 active replica that "jumps" between nodes.
  replicas: 1
  selector:
    matchLabels:
      app: space-mission
  template:
    metadata:
      labels:
        app: space-mission
    spec:
      # === ORBITAL CONSTRAINT (Node Selection) ===
      # Ensures the workload only runs on nodes labeled as 'satellite'.
      # The MPC Controller will update the hostname inside this selector during migration.
      nodeSelector:
        type: satellite

      # === CRIU PERSISTENCE LAYER ===
      # We map the physical host directory where the Kubelet and CRI-O
      # engine store memory dumps. This allows the Node Agent to find
      # the .tar files generated during a checkpoint.
      volumes:
        - name: checkpoint-storage
          hostPath:
            path: /var/lib/kubelet/checkpoints
            type: DirectoryOrCreate

      containers:
      # -----------------------------------------------------------
      # 1. THE GUARDIAN (Stateful Sidecar)
      # Role: Persistent Memory, Event Bus Broker & Dashboard UI.
      # This container is the one actually 'frozen' and 'migrated'.
      # -----------------------------------------------------------
      - name: sidecar-guardian
        # 'latest' is used for cold starts, 'restored' for migrations.
        image: localhost/space-sidecar:latest
        # Prevents K8s from trying to pull from DockerHub; uses local Buildah images.
        imagePullPolicy: Never

        ports:
        - containerPort: 80 # Exposes the Mission Control Dashboard

        env:
        # Self-awareness: The container knows which satellite it is currently orbiting.
        - name: NODE_NAME
          valueFrom: { fieldRef: { fieldPath: spec.nodeName } }

        # === CRITICAL: ELEVATED PRIVILEGES ===
        # CRIU requires low-level access to the Linux Kernel (ptrace, cap_checkpoint_restore).
        # 'privileged: true' and 'Unconfined' profile allow the process to be frozen.
        securityContext:
          privileged: true
          appArmorProfile:
            type: Unconfined

        # Mounts the host's checkpoint folder into the container for P2P gRPC streaming.
        volumeMounts:
          - name: checkpoint-storage
            mountPath: /var/lib/kubelet/checkpoints

      # -----------------------------------------------------------
      # 2. PHOENIX (Stateless Payload)
      # Role: Ephemeral AI Training.
      # This container is intentionally discarded during migration
      # and starts fresh (Warm Boot) on the destination node.
      # -----------------------------------------------------------
      - name: payload-phoenix
        image: localhost/space-workload:latest
        imagePullPolicy: Never

        env:
        # Communication via Pod Loopback: Phoenix talks to Guardian as if it were on localhost.
        - name: STATE_ENDPOINT
          value: "http://localhost:80"

        # === RESOURCE QUOTAS ===
        # Simulates the limited hardware resources of a CubeSat.
        # Throttling the CPU ensures the thermal simulation stays realistic.
        resources:
          requests:
            cpu: "100m"   # Reserved capacity
            memory: "128Mi"
          limits:
            cpu: "500m"   # Maximum burst (prevents thermal runaway in seconds)
            memory: "256Mi"