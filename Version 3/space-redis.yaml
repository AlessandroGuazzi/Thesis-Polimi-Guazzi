apiVersion: v1
kind: Service
metadata:
  name: redis-sat
  labels:
    app: redis
spec:
  ports:
  - port: 6379
    name: redis-client
  - port: 26379
    name: redis-sentinel
  clusterIP: None
  selector:
    app: redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    port 6379
    dir /data
    appendonly yes
    
  sentinel.conf: |
    bind 0.0.0.0
    port 26379
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor mymaster satellite-memory-0.redis-sat.default.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 2000
    sentinel failover-timeout mymaster 3000
    sentinel parallel-syncs mymaster 1

  init-redis.sh: |
    #!/bin/sh
    echo ">>> Init Satellite: $HOSTNAME"
    
    # Copia config base
    cp /config-ro/redis.conf /data/redis.conf
    cp /config-ro/sentinel.conf /data/sentinel.conf
    
    # --- LOGICA ROBUSTA V3.7 ---
    # 1. Chi sono io? (Risolvo il mio IP per confrontarlo)
    MY_IP=$(hostname -i)
    
    # 2. Chi è il Master secondo Sentinel?
    MASTER_INFO=$(redis-cli -h redis-sat -p 26379 sentinel get-master-addr-by-name mymaster)
    MASTER_HOST=$(echo "$MASTER_INFO" | head -n 1)
    
    echo ">>> Io sono: $MY_IP ($HOSTNAME)"
    echo ">>> Sentinel dice che il Master è: $MASTER_HOST"

    # 3. Decisione:
    if [ -z "$MASTER_HOST" ]; then
        # Caso A: Sentinel non sa nulla (Cluster vergine o Sentinel morti)
        INDEX=${HOSTNAME##*-}
        if [ "$INDEX" = "0" ]; then
            echo ">>> Nessun Master noto. Sono il Nodo 0. Prendo il comando."
            # Divento Master (nessuna istruzione replicaof)
        else
            echo ">>> Nessun Master noto. Attendo il Nodo 0."
            echo "replicaof satellite-memory-0.redis-sat.default.svc.cluster.local 6379" >> /data/redis.conf
        fi
        
    elif [ "$MASTER_HOST" = "$MY_IP" ] || [ "$MASTER_HOST" = "127.0.0.1" ]; then
        # Caso B: Sentinel dice che SONO IO il master! (Il caso che ti ha bloccato)
        echo ">>> Sentinel dice che sono IO il Master. Prendo il comando!"
        # Divento Master (nessuna istruzione replicaof)
        
    else
        # Caso C: C'è un Master valido ed è qualcun altro.
        echo ">>> Mi unisco come Replica di $MASTER_HOST"
        echo "replicaof $MASTER_HOST 6379" >> /data/redis.conf
    fi
    
    # Permessi e avvio
    chown -R 999:999 /data
    chmod 666 /data/sentinel.conf /data/redis.conf

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: satellite-memory
spec:
  serviceName: "redis-sat"
  # Parallel: Avvia tutti i pod insieme senza aspettare il precedente.
  # Questo sblocca lo scheduler anche se un nodo fallisce!
  podManagementPolicy: Parallel 
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      schedulerName: space-scheduler
      
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis
            topologyKey: "kubernetes.io/hostname"

      initContainers:
      - name: init-satellite
        image: redis:alpine
        command: ["/bin/sh", "/config-ro/init-redis.sh"]
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: config-ro
          mountPath: /config-ro
        - name: redis-data
          mountPath: /data
        # Init gira come ROOT per poter fare chown
        securityContext:
          runAsUser: 0 

      containers:
      - name: redis
        image: redis:alpine
        command: ["redis-server", "/data/redis.conf"]
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        # Redis gira come utente redis (999)
        securityContext:
          runAsUser: 999

      - name: sentinel
        image: redis:alpine
        command: ["redis-sentinel", "/data/sentinel.conf"]
        ports:
        - containerPort: 26379
          name: sentinel
        volumeMounts:
        - name: redis-data
          mountPath: /data
        # Sentinel gira come utente redis (999)
        securityContext:
          runAsUser: 999

      volumes:
      - name: config-ro
        configMap:
          name: redis-config
          defaultMode: 0777 # Permessi larghi alla sorgente
      
      - name: redis-data
        emptyDir: {}