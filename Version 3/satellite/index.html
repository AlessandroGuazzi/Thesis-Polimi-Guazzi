<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud V3 | Mesh Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette V3 - Deep Space Mesh Refined */
            --bg-deep: #050a14;
            --glass-bg: rgba(12, 24, 40, 0.65);
            --glass-border: rgba(0, 243, 255, 0.15);
            --glass-highlight: rgba(255, 255, 255, 0.05);
            
            --primary: #00f3ff;       /* Ciano - Compute/Link */
            --primary-glow: rgba(0, 243, 255, 0.4);
            
            --memory: #bd00ff;        /* Viola - Memory/Redis */
            --memory-glow: rgba(189, 0, 255, 0.4);
            
            --success: #00ff9d;       /* Verde - Healthy */
            --warning: #ffb800;       /* Giallo - Low Batt/Sun */
            --danger: #ff0055;        /* Rosso - Critical/Fault */
            
            --text-main: #ffffff;
            --text-dim: #8a9bb0;
            
            --font-tech: 'Rajdhani', sans-serif;
            --font-ui: 'Barlow', sans-serif;
        }

        body { 
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-ui);
            margin: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
            
            /* Background sofisticato */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.05) 0%, transparent 60%),
                linear-gradient(rgba(0, 243, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .dashboard-wrapper { 
            display: flex; gap: 24px; z-index: 10; padding: 30px; 
            width: 100%; max-width: 1100px; height: 85vh;
            box-sizing: border-box;
        }

        .col { 
            display: flex; flex-direction: column; gap: 24px; flex: 1; 
            height: 100%;
        }

        /* --- GLASSMORMISM CARD --- */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(0, 243, 255, 0.3); /* Top highlight */
            border-radius: 16px;
            padding: 25px; 
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* Angoli tech decorativi */
        .card::after {
            content: ""; position: absolute; bottom: 0; right: 0; 
            width: 20px; height: 20px;
            border-bottom: 2px solid var(--primary);
            border-right: 2px solid var(--primary);
            border-radius: 0 0 16px 0;
            opacity: 0.5;
        }

        h1 { 
            font-family: var(--font-tech); 
            font-size: 18px; 
            font-weight: 600;
            letter-spacing: 2px; 
            color: var(--text-dim); 
            margin: 0 0 25px 0; 
            text-transform: uppercase; 
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .live-dot {
            height: 8px; width: 8px; background-color: var(--success);
            border-radius: 50%; display: inline-block; margin-right: 6px;
            box-shadow: 0 0 8px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        
        /* --- METRICS & DATA --- */
        .metric-row { display: flex; justify-content: space-between; margin-bottom: 25px; align-items: flex-end; }

        .metric-big { 
            font-family: var(--font-tech); 
            font-size: 64px; line-height: 1; font-weight: 600; 
            color: var(--text-main); 
            text-shadow: 0 0 20px var(--primary-glow);
        }
        
        .label { 
            font-size: 11px; color: var(--text-dim); letter-spacing: 1px; 
            text-transform: uppercase; font-weight: 600; margin-bottom: 6px;
            display: block;
        }

        .connection-box {
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            padding: 15px;
            border-left: 3px solid var(--text-dim);
            transition: all 0.3s ease;
        }

        /* --- ORBIT VISUALIZATION (RADAR) --- */
        .orbit-wrapper {
            flex: 1; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            position: relative;
        }

        .orbit-container {
            width: 280px; height: 280px; position: relative;
            border-radius: 50%; 
            /* Radar Rings Look */
            background: 
                radial-gradient(circle, transparent 69%, rgba(0, 243, 255, 0.1) 70%, transparent 71%),
                radial-gradient(circle, transparent 49%, rgba(0, 243, 255, 0.05) 50%, transparent 51%),
                radial-gradient(circle, rgba(0, 243, 255, 0.02) 0%, transparent 70%);
            border: 1px solid rgba(0, 243, 255, 0.1);
            box-shadow: 0 0 30px rgba(0,0,0,0.3);
        }

        /* Earth Planet */
        .earth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a2a40, #050a14);
            border: 1px solid rgba(0, 243, 255, 0.3);
            display: flex; align-items: center; justify-content: center;
            z-index: 1; 
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.15), inset 0 0 10px rgba(0,0,0,0.8);
        }
        .earth::after { 
            content: "EARTH"; font-family: var(--font-tech); 
            font-size: 12px; color: var(--text-dim); letter-spacing: 2px; font-weight: bold;
        }

        /* Scanning Line */
        .orbit-shadow {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            background: linear-gradient(90deg, rgba(0, 243, 255, 0) 0%, rgba(0, 243, 255, 0.1) 100%);
            border-radius: 0 140px 140px 0; 
            transform-origin: 0 50%;
            animation: radar-scan 4s linear infinite;
            z-index: 0; pointer-events: none;
        }

        @keyframes radar-scan { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .sat-dot {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1); z-index: 2;
        }

        .dot-body {
            width: 14px; height: 14px; background: #fff; border-radius: 50%;
            margin: -7px auto 0; position: relative;
            box-shadow: 0 0 10px currentColor;
            border: 2px solid var(--bg-deep); /* "Cutout" effect */
        }

        /* --- FLEET LIST (SCROLLABLE) --- */
        .fleet-wrapper {
            flex: 1; overflow-y: auto; padding-right: 5px;
            /* Scrollbar styling */
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }
        .fleet-wrapper::-webkit-scrollbar { width: 4px; }
        .fleet-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .fleet-container { display: flex; flex-direction: column; gap: 10px; }
        
        .sat-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px; border-radius: 8px;
            background: rgba(255,255,255,0.02); 
            border: 1px solid transparent;
            border-left: 3px solid transparent;
            transition: all 0.2s ease;
        }

        .sat-row:hover { background: rgba(255,255,255,0.05); transform: translateX(2px); }
        
        /* Highlighting Logic */
        .sat-row.is-compute { border-left-color: var(--primary); box-shadow: inset 10px 0 20px -10px rgba(0, 243, 255, 0.1); }
        .sat-row.is-memory { border-left-color: var(--memory); box-shadow: inset 10px 0 20px -10px rgba(189, 0, 255, 0.1); }
        .sat-row.is-fault { border-left-color: var(--danger); background: rgba(255, 0, 85, 0.05); }
        .sat-row.is-master { border-left-color: #ffd700; border-top: 1px solid rgba(255, 215, 0, 0.2); border-bottom: 1px solid rgba(255, 215, 0, 0.2); }

        .sat-name { font-family: var(--font-tech); font-weight: 700; font-size: 16px; color: #fff; margin-right: 8px; }

        .badge { 
            font-size: 9px; padding: 4px 8px; border-radius: 4px; 
            font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-right: 5px;
            display: inline-block; vertical-align: middle;
        }
        .bg-sun { color: var(--bg-deep); background: var(--warning); box-shadow: 0 0 10px rgba(255, 184, 0, 0.4); }
        .bg-ecl { color: var(--text-dim); border: 1px solid var(--text-dim); background: transparent; }
        
        .badge-role { color: var(--bg-deep); font-weight: 800; border: none; }
        .role-compute { background: var(--primary); color: var(--bg-deep); }
        .role-memory { background: var(--memory); color: #fff; }
        .role-idle { background: rgba(255,255,255,0.1); color: var(--text-dim); }
        .role-master { background: #ffd700; color: #000; box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }

        .batt-val { font-family: var(--font-tech); font-size: 18px; font-weight: 700; text-align: right; }
        
        /* --- DB INFO --- */
        .db-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: auto; /* Push to bottom */
            padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .db-status { 
            font-family: var(--font-tech); color: var(--success); 
            font-weight: 700; letter-spacing: 1px; font-size: 14px;
            text-shadow: 0 0 10px rgba(0, 255, 157, 0.4);
        }

    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        
        <div class="col" style="flex: 0 0 35%;">
            
            <div class="card">
                <h1>
                    <span>Mission Control</span>
                    <span style="display:flex; align-items:center; font-size:11px; color:var(--success);">
                        <span class="live-dot"></span> LIVE
                    </span>
                </h1>
                
                <div class="metric-row">
                    <div>
                        <span class="label">GLOBAL COUNTER</span>
                        <div class="metric-big" id="data-counter" style="color:var(--primary)">---</div>
                    </div>
                    <div style="text-align:right">
                        <span class="label">ACTIVE REPLICAS</span>
                        <div class="metric-big" id="replica-count" style="font-size:42px;">1</div>
                    </div>
                </div>

                <div class="connection-box">
                    <span class="label">CURRENT UPLINK</span>
                    <div id="pod-name" style="font-family:var(--font-tech); font-size:20px; color:var(--text-main); margin-bottom:4px; font-weight:600;">
                        SCANNING...
                    </div>
                    <div id="memory-mode" style="font-size:12px; color:var(--text-dim);">
                        Protocol: WAIT
                    </div>
                </div>
            </div>

            <div class="card" style="flex:1;">
                <h1>Orbital Topology</h1>
                <div class="orbit-wrapper">
                    <div class="orbit-container">
                        <div class="orbit-shadow"></div>
                        <div class="earth"></div>
                        <div id="orbit-layer"></div>
                    </div>
                    <div style="text-align: center; margin-top:20px; font-size:11px; color:var(--text-dim); letter-spacing: 1px;">
                        PHYSICS ENGINE V3.2 <span style="color:var(--primary)">[ACTIVE]</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card" style="height: 100%;">
                <h1>
                    <span>Fleet Telemetry</span>
                    <span id="fleet-count" style="font-size:13px; color:var(--primary); background:rgba(0, 243, 255, 0.1); padding:4px 8px; border-radius:4px;">0 NODES</span>
                </h1>
                
                <div class="fleet-wrapper">
                    <div class="fleet-container" id="fleet-list">
                        </div>
                </div>

                <div class="db-info">
                    <div>
                        <span class="label">MEMORY GRID</span>
                        <div class="db-status">REDIS MESH ACTIVE</div>
                    </div>
                    <div style="text-align:right">
                        <span class="label">CONSENSUS</span>
                        <div style="color:var(--text-main); font-size:13px; font-weight:500;">SENTINEL QUORUM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Logica JS mantenuta intatta al 100%, solo aggiornati gli stili visuali generati
        const counterEl = document.getElementById('data-counter');
        const replicaEl = document.getElementById('replica-count');
        const podEl = document.getElementById('pod-name');
        const memModeEl = document.getElementById('memory-mode');
        const fleetList = document.getElementById('fleet-list');
        const fleetCount = document.getElementById('fleet-count');
        const orbitLayer = document.getElementById('orbit-layer');

        async function updateTelemetry() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                // 1. Aggiorna Dati Generali
                counterEl.innerText = data.count;
                
                if (data.mission_control) {
                    replicaEl.innerText = data.mission_control.replicas;
                    if(data.mission_control.replicas == "0") replicaEl.style.color = "var(--danger)";
                    else replicaEl.style.color = "var(--text-main)";
                }

                podEl.innerText = `${data.satellite_pod}`;
                // Coloriamo dinamicamente il pod name se connesso
                podEl.style.textShadow = "0 0 10px rgba(255,255,255,0.3)";
                
                memModeEl.innerText = `Protocol: ${data.memory_mode || 'DIRECT'}`;

                // 2. Render Flotta (Satelliti)
                fleetList.innerHTML = '';
                orbitLayer.innerHTML = '';
                
                const satNames = Object.keys(data.fleet || {}).sort();
                fleetCount.innerText = `${satNames.length} NODES ONLINE`;

                satNames.forEach((name, index) => {
                    const sat = data.fleet[name];
                    const isMyHost = (name === data.satellite_node);
                    const isFaulty = (sat.health === 'OFFLINE');
                    
                    let roleClass = 'role-idle';
                    let roleLabel = 'IDLE';
                    let rowClass = '';
                    let dotColor = '#647b94'; 

                    if (sat.load === 'COMPUTE') {
                        roleClass = 'role-compute';
                        roleLabel = 'DASHBOARD';
                        rowClass = 'is-compute';
                        dotColor = 'var(--primary)'; 
                    } else if (sat.load === 'MEMORY') {
                        if (sat.role === 'MASTER') {
                            roleClass = 'role-master'; 
                            roleLabel = 'DB MASTER';   
                            rowClass = 'is-master';    
                            dotColor = '#ffd700';      
                        } else {
                            roleClass = 'role-memory'; 
                            roleLabel = 'DB REPLICA';
                            rowClass = 'is-memory';
                            dotColor = 'var(--memory)'; 
                        }
                    }

                    if (isFaulty) {
                        rowClass = 'is-fault';
                        dotColor = 'var(--danger)';
                        roleLabel = 'OFFLINE';
                    }

                    // --- HTML LISTA (Migliorato Layout Flexbox interno) ---
                    const rowHtml = `
                        <div class="sat-row ${rowClass}">
                            <div style="display:flex; flex-direction:column; gap:4px;">
                                <div style="display:flex; align-items:center;">
                                    <div class="sat-name">
                                        ${name.replace('space-cloud-', '').toUpperCase()}
                                    </div>
                                    ${isMyHost ? '<span style="font-size:9px; color:var(--primary); border:1px solid var(--primary); padding:1px 4px; border-radius:3px; font-weight:bold;">YOU</span>' : ''}
                                </div>
                                <div style="display:flex;">
                                    <span class="badge ${roleClass}">${roleLabel}</span>
                                    <span class="badge ${sat.phase === 'SUN' ? 'bg-sun' : 'bg-ecl'}">${sat.phase}</span>
                                </div>
                            </div>
                            <div style="text-align:right;">
                                <div class="batt-val" style="color: ${getBatteryColor(sat.battery)}">
                                    ${sat.battery.toFixed(1)}%
                                </div>
                                <div class="label" style="margin-top:2px;">${sat.status}</div>
                            </div>
                        </div>`;
                    fleetList.innerHTML += rowHtml;

                    // --- ORBIT VISUALIZATION ---
                    const rotation = (sat.orbit_pos * 360) + 180; 
                    
                    const dot = document.createElement('div');
                    dot.className = 'sat-dot';
                    dot.style.transform = `rotate(${rotation}deg)`;
                    
                    let pulseEffect = isMyHost ? `box-shadow: 0 0 15px ${dotColor}, 0 0 30px ${dotColor}; border: 2px solid #fff; z-index:10; width:16px; height:16px; margin:-8px auto 0;` : `background-color: ${dotColor}`;

                    dot.innerHTML = `
                        <div class="dot-body" style="${pulseEffect}; background-color: ${isMyHost ? dotColor : dotColor};"></div>
                    `;
                    orbitLayer.appendChild(dot);
                });

            } catch (e) {
                console.error(e);
                podEl.innerText = "SIGNAL LOST...";
                podEl.style.color = "var(--danger)";
                document.querySelector('.connection-box').style.borderLeftColor = "var(--danger)";
            }
        }

        function getBatteryColor(val) {
            if (val < 20) return "var(--danger)";
            if (val < 40) return "var(--warning)";
            return "var(--success)";
        }

        setInterval(updateTelemetry, 1000);
        updateTelemetry();
    </script>
</body>
</html>
