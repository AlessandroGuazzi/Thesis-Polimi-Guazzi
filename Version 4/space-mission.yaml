apiVersion: v1
kind: Service
metadata:
  name: space-mission-service
spec:
  type: ClusterIP
  selector:
    app: space-mission
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-mission
  labels:
    app: space-mission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-mission
  template:
    metadata:
      labels:
        app: space-app 
        mission: v2-monolith
        # Aggiungiamo una label per aiutare lo scheduler Python a filtrare meglio
        scheduler: space-scheduler
    spec:
      # --- MODIFICA FONDAMENTALE ---
      # Questo dice a K8s: "Non toccare questo pod, aspetta che lo faccia lo script Python"
      schedulerName: space-scheduler
      # -----------------------------

      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

      containers:
      # --- CONTAINER 1: IL CERVELLO (DASHBOARD) ---
      - name: main-app
        image: space-dashboard:v2
        imagePullPolicy: Never
        
        env:
        - name: REDIS_HOST
          value: "localhost"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
              
        ports:
        - containerPort: 3000
        
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"

      # --- CONTAINER 2: LA MEMORIA (REDIS SIDECAR) ---
      - name: memory-unit
        image: redis:alpine
        
        ports:
        - containerPort: 6379
        
        resources:
          requests:
            memory: "32Mi"
            cpu: "50m"
          limits:
            memory: "64Mi"
            cpu: "100m"