apiVersion: v1
kind: Service
metadata:
  name: redis-sat
  labels:
    app: redis
spec:
  ports:
  - port: 6379
    name: redis-client
  - port: 26379
    name: redis-sentinel
  clusterIP: None
  selector:
    app: redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    port 6379
    dir /data
    appendonly yes
    
  sentinel.conf: |
    bind 0.0.0.0
    port 26379
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor mymaster satellite-memory-0.redis-sat.default.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 5000
    sentinel failover-timeout mymaster 10000
    sentinel parallel-syncs mymaster 1

  init-redis.sh: |
    #!/bin/sh
    echo ">>> Inizializzazione Satellite Memoria: $HOSTNAME"
    
    # Copia configurazioni
    cp /config-ro/redis.conf /data/redis.conf
    cp /config-ro/sentinel.conf /data/sentinel.conf
    
    # Setup Replica/Master
    INDEX=${HOSTNAME##*-}
    if [ "$INDEX" = "0" ]; then
      echo ">>> Sono il nodo 0. MASTER iniziale."
    else
      echo ">>> Sono il nodo $INDEX. REPLICA di nodo 0."
      echo "replicaof satellite-memory-0.redis-sat.default.svc.cluster.local 6379" >> /data/redis.conf
    fi

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: satellite-memory
spec:
  serviceName: "redis-sat"
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      schedulerName: space-scheduler

      # Anti-Affinity: Distribuzione su nodi diversi
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis
            topologyKey: "kubernetes.io/hostname"

      initContainers:
      - name: init-satellite
        image: redis:alpine
        command: ["/bin/sh", "/config-ro/init-redis.sh"]
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: config-ro
          mountPath: /config-ro
        - name: redis-data
          mountPath: /data

      containers:
      - name: redis
        image: redis:alpine
        command: ["redis-server", "/data/redis.conf"]
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data

      - name: sentinel
        image: redis:alpine
        command: ["redis-sentinel", "/data/sentinel.conf"]
        ports:
        - containerPort: 26379
          name: sentinel
        volumeMounts:
        - name: redis-data
          mountPath: /data

      volumes:
      - name: config-ro
        configMap:
          name: redis-config
          defaultMode: 0755
      
      # STORAGE VOLATILE (Stabile per simulazioni)
      - name: redis-data
        emptyDir: {}