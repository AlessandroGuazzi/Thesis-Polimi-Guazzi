apiVersion: v1
kind: Service
metadata:
  name: redis-sat
  labels:
    app: redis
spec:
  ports:
  - port: 6379
    name: redis-client
  - port: 26379
    name: redis-sentinel
  clusterIP: None
  selector:
    app: redis
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode no
    port 6379
    dir /data
    appendonly yes
    
  sentinel.conf: |
    bind 0.0.0.0
    port 26379
    sentinel resolve-hostnames yes
    sentinel announce-hostnames yes
    sentinel monitor mymaster satellite-memory-0.redis-sat.default.svc.cluster.local 6379 2
    sentinel down-after-milliseconds mymaster 2000
    sentinel failover-timeout mymaster 3000
    sentinel parallel-syncs mymaster 1

  init-redis.sh: |
    #!/bin/sh
    echo ">>> Init Satellite: $HOSTNAME"
    
    # 1. Copia i file (come root)
    cp /config-ro/redis.conf /data/redis.conf
    cp /config-ro/sentinel.conf /data/sentinel.conf
    
    # 2. Configura Master/Replica
    INDEX=${HOSTNAME##*-}
    if [ "$INDEX" = "0" ]; then
      echo ">>> Nodo 0: Configurazione Master."
    else
      echo ">>> Nodo $INDEX: Configurazione Replica."
      echo "replicaof satellite-memory-0.redis-sat.default.svc.cluster.local 6379" >> /data/redis.conf
    fi
    
    # 3. FIX PERMESSI "BRUTALE" (Funziona sempre)
    # Diamo tutto all'utente redis (999)
    echo ">>> Applicazione permessi (chown 999)..."
    chown -R 999:999 /data
    
    # 4. FIX SENTINEL
    # Sentinel ha bisogno di scrivere il suo file di config. 
    # Assicuriamoci che i permessi siano 644 o 666
    chmod 666 /data/sentinel.conf
    chmod 666 /data/redis.conf

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: satellite-memory
spec:
  serviceName: "redis-sat"
  # Parallel: Avvia tutti i pod insieme senza aspettare il precedente.
  # Questo sblocca lo scheduler anche se un nodo fallisce!
  podManagementPolicy: Parallel 
  replicas: 3
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      schedulerName: space-scheduler
      
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - redis
            topologyKey: "kubernetes.io/hostname"

      initContainers:
      - name: init-satellite
        image: redis:alpine
        command: ["/bin/sh", "/config-ro/init-redis.sh"]
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        volumeMounts:
        - name: config-ro
          mountPath: /config-ro
        - name: redis-data
          mountPath: /data
        # Init gira come ROOT per poter fare chown
        securityContext:
          runAsUser: 0 

      containers:
      - name: redis
        image: redis:alpine
        command: ["redis-server", "/data/redis.conf"]
        ports:
        - containerPort: 6379
          name: redis
        volumeMounts:
        - name: redis-data
          mountPath: /data
        # Redis gira come utente redis (999)
        securityContext:
          runAsUser: 999

      - name: sentinel
        image: redis:alpine
        command: ["redis-sentinel", "/data/sentinel.conf"]
        ports:
        - containerPort: 26379
          name: sentinel
        volumeMounts:
        - name: redis-data
          mountPath: /data
        # Sentinel gira come utente redis (999)
        securityContext:
          runAsUser: 999

      volumes:
      - name: config-ro
        configMap:
          name: redis-config
          defaultMode: 0777 # Permessi larghi alla sorgente
      
      - name: redis-data
        emptyDir: {}