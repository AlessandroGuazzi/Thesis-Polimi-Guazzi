# =============================================================================
# 1. PERMESSI (RBAC) - "La Tessera Magnetica dell'Agente"
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: space-agent-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: space-agent-role
rules:
- apiGroups: ["", "apps"]
  resources: ["pods", "pods/exec", "deployments", "deployments/scale", "nodes", "nodes/proxy"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: space-agent-binding
subjects:
- kind: ServiceAccount
  name: space-agent-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: space-agent-role
  apiGroup: rbac.authorization.k8s.io

# =============================================================================
# 2. IL DAEMONSET - "Il dispiegamento su tutta la flotta"
# =============================================================================
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: space-node-agent
  labels:
    app: space-node-agent
spec:
  selector:
    matchLabels:
      app: space-node-agent
  template:
    metadata:
      labels:
        app: space-node-agent
    spec:
      serviceAccountName: space-agent-sa

      # NECESSARI PER BUILDAH E MANIPOLAZIONE NODI
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      nodeSelector:
        type: satellite

      containers:
      - name: agent
        image: localhost/space-node-agent:latest
        imagePullPolicy: Never

        securityContext:
          privileged: true

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        # ---> LA FIX E' QUI: Usiamo il nome di rete breve! <---
        - name: REDIS_HOST
          value: "system-redis"

        volumeMounts:
        - name: containers-storage
          mountPath: /var/lib/containers
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
        - name: run-dir
          mountPath: /run

      volumes:
      - name: containers-storage
        hostPath:
          path: /var/lib/containers
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
      - name: run-dir
        hostPath:
          path: /run