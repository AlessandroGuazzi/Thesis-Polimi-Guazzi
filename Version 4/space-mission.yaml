apiVersion: v1
kind: Service
metadata:
  name: space-mission-service
spec:
  type: ClusterIP
  selector:
    app: space-app
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-mission
  labels:
    app: space-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-app
  template:
    metadata:
      labels:
        app: space-app 
        mission: v2-full-ai
        scheduler: space-scheduler
    spec:
      # --- QUESTA RIGA BLOCCA KUBERNETES STANDARD ---
      schedulerName: space-scheduler
      # ----------------------------------------------

      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

      containers:
      # 1. APP (Dashboard)
      - name: main-app
        image: space-dashboard:v2
        imagePullPolicy: Never
        env:
        - name: REDIS_HOST
          value: "localhost" # Sidecar interno
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 3000
        resources:
          requests: { memory: "64Mi", cpu: "100m" }
          limits: { memory: "128Mi", cpu: "200m" }

      # 2. MEMORIA (Redis Sidecar)
      - name: memory-unit
        image: redis:alpine
        ports:
        - containerPort: 6379
        resources:
          requests: { memory: "32Mi", cpu: "50m" }
          limits: { memory: "64Mi", cpu: "100m" }