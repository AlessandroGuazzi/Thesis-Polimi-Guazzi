<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud | Mission Control V3.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-space: #0a0a12;
            --bg-panel: #141420;
            --text-primary: #e0e0ff;
            --text-secondary: #8a8ab5;
            --accent-blue: #00d2ff;
            --accent-purple: #9d00ff;
            --accent-sun: #ffdb4d;
            --status-ok: #00ff9d;
            --status-warn: #ffbb00;
            --status-danger: #ff3366;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-space);
            background-image: radial-gradient(circle at center, #1b1b2f 0%, #050508 80%);
            color: var(--text-primary);
            font-family: 'Roboto Mono', monospace;
            overflow-x: hidden;
        }

        /* --- HEADER & STATUS BAR --- */
        #header {
            text-align: center;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            color: var(--accent-blue);
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            letter-spacing: 3px;
        }

        .mission-status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(20, 20, 32, 0.8);
            border: 1px solid #333;
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 150px;
        }
        .status-label { font-size: 0.8em; color: var(--text-secondary); text-transform: uppercase; }
        .status-value { font-size: 1.1em; font-weight: bold; color: white; font-family: 'Orbitron', sans-serif; }
        .status-value.highlight { color: var(--accent-purple); text-shadow: 0 0 10px var(--accent-purple); }

        /* --- ORBITAL MAP VISUALIZER --- */
        #orbit-system {
            position: relative;
            width: 400px;
            height: 400px;
            margin: 40px auto;
            border-radius: 50%;
            /* Orbit Path border */
            border: 1px dashed rgba(255, 255, 255, 0.15);
        }

        /* 1. Earth (Center) */
        .earth {
            position: absolute;
            top: 50%; left: 50%;
            width: 60px; height: 60px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle at 30% 30%, #4facfe, #00f2fe);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.6);
            z-index: 10;
            display: flex;
            align-items: center; justify-content: center;
            font-size: 1.5em;
        }

        /* 2. The Sun (Directional Light Source) */
        /* Located at Right (90deg) to oppose shadow at Left (270deg) */
        .sun-indicator {
            position: absolute;
            top: 50%; left: 140%;
            transform: translate(-50%, -50%);
            font-size: 3em;
            color: var(--accent-sun);
            text-shadow: 0 0 30px var(--accent-sun);
        }

        /* 3. Shadow Cone (Eclipse Zone) */
        /* Matches Physics Engine: 220deg to 320deg */
        .shadow-cone {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                transparent 0deg 220deg,
                rgba(0, 0, 0, 0.7) 220deg 320deg, /* Dark Zone exact match */
                transparent 320deg 360deg
            );
            pointer-events: none;
            z-index: 1;
        }
        .shadow-label {
            position: absolute;
            bottom: 10%; left: 20%; /* Positioned near the shadow cone */
            color: #555;
            font-size: 0.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 4. Satellites on Orbit */
        .sat-marker {
            position: absolute;
            top: 0; left: 50%; /* Start at top center */
            width: 0px; height: 50%; /* Height is radius */
            transform-origin: bottom center; /* Rotate around earth */
            z-index: 20;
            transition: transform 1s linear; /* Smooth movement */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* Il pallino del satellite */
        .sat-body {
            width: 16px; height: 16px;
            background: #333;
            border: 2px solid var(--accent-blue);
            border-radius: 50%;
            box-shadow: 0 0 5px var(--accent-blue);
            margin-top: -8px; /* Center on the orbit line */
            transition: all 0.3s;
        }

        /* L'etichetta sotto il satellite */
        .sat-label {
            margin-top: 5px;
            font-size: 0.8em;
            color: var(--text-secondary);
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }

        /* Active Satellite Animation */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(157, 0, 255, 0.7); border-color: #fff;}
            70% { box-shadow: 0 0 0 15px rgba(157, 0, 255, 0); border-color: var(--accent-purple);}
            100% { box-shadow: 0 0 0 0 rgba(157, 0, 255, 0); border-color: #fff;}
        }

        .sat-body.pulsing {
            background: var(--accent-purple);
            animation: pulse 2s infinite;
        }

        .sat-label.pulsing-text {
            color: var(--accent-purple);
        }

        /* Ground Station Marker (Fixed) */
        .ground-marker {
            position: absolute;
            top: 60%; left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
            color: #666;
            z-index: 5;
        }

        /* --- CARDS GRID --- */
        #dashboard-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .node-card {
            background: var(--bg-panel);
            border: 1px solid #333;
            border-radius: 6px;
            padding: 15px;
            position: relative;
        }
        .node-card.active-node {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(157, 0, 255, 0.15);
        }
        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            color: white;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Bars */
        .metric-row { margin-bottom: 8px; }
        .metric-meta { display: flex; justify-content: space-between; font-size: 0.8em; color: var(--text-secondary); margin-bottom: 3px; }
        .bar-bg { height: 6px; background: #222; border-radius: 3px; overflow: hidden; }
        .bar-val { height: 100%; transition: width 0.5s; }

    </style>
</head>
<body>

    <div id="header">
        <h1>🚀 Space Cloud Orbit</h1>

        <div class="mission-status-bar">
            <div class="status-item">
                <span class="status-label">Vessel Identity</span>
                <span id="pod-name-display" class="status-value">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">Active Node</span>
                <span id="active-node-display" class="status-value highlight">--</span>
            </div>
            <div class="status-item">
                <span class="status-label">Mission Time</span>
                <span id="mission-time-display" class="status-value">T+0s</span>
            </div>
        </div>
    </div>

    <div id="orbit-system">
        <div class="earth">🌍</div>
        <div class="ground-marker">📡 Ground</div>

        <div class="shadow-cone"></div>
        <div class="shadow-label">Eclipse Zone</div>

        <div class="sun-indicator">☀️</div>

        <div id="satellites-layer"></div>
    </div>

    <div id="loading" style="text-align:center; margin-top:20px; color:#666;">Waiting for telemetry link...</div>

    <div id="dashboard-content"></div>

    <script>
        function getBatteryColor(level) {
            if (level > 60) return 'var(--status-ok)';
            if (level > 25) return 'var(--status-warn)';
            return 'var(--status-danger)';
        }

        function getTempColor(temp) {
            if (temp < 45) return '#00d2ff';
            if (temp < 75) return 'var(--status-warn)';
            return 'var(--status-danger)';
        }

        async function fetchData() {
            try {
                const response = await fetch('/api/telemetry');
                if (!response.ok) throw new Error("Network err");

                const fullData = await response.json();

                // 1. Update Header Info
                document.getElementById('pod-name-display').innerText = fullData.satellite_id || "Unknown";
                document.getElementById('mission-time-display').innerText = `T+${fullData.internal_state.mission_timer}s`;

                const telemetry = fullData.environment;

                if (!telemetry || telemetry.status === "NO_DATA") {
                    document.getElementById('loading').style.display = 'block';
                    return;
                }
                document.getElementById('loading').style.display = 'none';

                updateSystem(telemetry);

            } catch (error) {
                console.error(error);
            }
        }

        function updateSystem(telemetry) {
            const cardContainer = document.getElementById('dashboard-content');
            const satLayer = document.getElementById('satellites-layer');

            cardContainer.innerHTML = '';
            satLayer.innerHTML = '';

            let activeNodeName = "MIGRATING...";

            // Sort keys
            const sortedKeys = Object.keys(telemetry).sort();

            sortedKeys.forEach(nodeName => {
                const data = telemetry[nodeName];
                const isActive = data.is_working;

                if (isActive) activeNodeName = nodeName;

                // --- 1. RENDER CARDS (Bottom) ---
                const batColor = getBatteryColor(data.battery);
                const tempColor = getTempColor(data.temp);
                const tempPct = Math.min(100, Math.max(0, (data.temp + 20) / 1.2));

                // Icona Ambiente: ☀️ se al sole, 🌑 se in eclissi (solo per satelliti)
                let envIcon = "";
                if (data.type !== 'ground') {
                    envIcon = data.eclipse ? "🌑" : "☀️";
                }

                const cardHtml = `
                <div class="node-card ${isActive ? 'active-node' : ''}">
                    <div class="card-title">
                        <span>${nodeName}</span>
                        <span>${envIcon} <span style="font-size:0.8em; color:${data.type === 'ground' ? '#666' : 'var(--accent-blue)'}">${data.type.toUpperCase()}</span></span>
                    </div>

                    <div class="metric-row">
                        <div class="metric-meta"><span>BATTERY</span><span>${data.battery.toFixed(0)}%</span></div>
                        <div class="bar-bg"><div class="bar-val" style="width:${data.battery}%; background:${batColor}"></div></div>
                    </div>

                    <div class="metric-row">
                        <div class="metric-meta"><span>TEMP</span><span>${data.temp.toFixed(0)}°C</span></div>
                        <div class="bar-bg"><div class="bar-val" style="width:${tempPct}%; background: linear-gradient(90deg, #00d2ff, ${tempColor})"></div></div>
                    </div>
                </div>`;
                cardContainer.insertAdjacentHTML('beforeend', cardHtml);


                // --- 2. RENDER ORBIT MAP (Satellites Only) ---
                if (data.type !== 'ground') {
                    // Wrapper che ruota
                    const wrapper = document.createElement('div');
                    wrapper.className = 'sat-marker';
                    wrapper.style.transform = `rotate(${data.angle}deg)`;

                    // Body del satellite (Il pallino)
                    const body = document.createElement('div');
                    body.className = `sat-body ${isActive ? 'pulsing' : ''}`;

                    // Etichetta (Numero)
                    const label = document.createElement('div');
                    label.className = `sat-label ${isActive ? 'pulsing-text' : ''}`;
                    // Estrae "02" o "03" dal nome "minikube-m02"
                    const shortName = nodeName.split('-').pop().replace('m', '');
                    label.innerText = shortName;

                    wrapper.appendChild(body);
                    wrapper.appendChild(label);
                    satLayer.appendChild(wrapper);
                }
            });

            // Update Status Bar Active Node
            document.getElementById('active-node-display').innerText = activeNodeName;
        }

        setInterval(fetchData, 1000);
        fetchData();
    </script>
</body>
</html>
