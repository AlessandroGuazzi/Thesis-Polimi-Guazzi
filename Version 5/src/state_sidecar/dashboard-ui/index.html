<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Metadati base e configurazione viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud Mission Control</title>

    <!-- Font esterno Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Variabili CSS globali (colori, raggi, ombre) stile iOS */
        :root {
            --ios-bg: #F5F5F7; --ios-card: #FFFFFF; --ios-text: #1D1D1F; --ios-subtext: #86868B;
            --ios-border: #E5E5EA; --blue: #007AFF; --green: #34C759; --orange: #FF9500; --red: #FF3B30;
            --radius-l: 24px; --radius-m: 20px;
            --shadow-soft: 0 4px 12px rgba(0,0,0,0.03);
        }

        /* Stile base pagina: layout a colonna full-height */
        body { margin: 0; padding: 0; background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif; height: 100vh; display: flex; flex-direction: column; color: var(--ios-text); overflow: hidden; }

        /* HEADER */
        /* Barra superiore con brand e stato attivo */
        header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--ios-border); z-index: 100; }
        .brand { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; display: flex; gap: 10px; }
        .pill-stack { display: flex; gap: 12px; }

        /* Pillole info (badge stato/timer) */
        .pill { background: var(--ios-bg); padding: 8px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; color: var(--ios-subtext); display: flex; gap: 8px; align-items: center; }

        /* Stile del timer missione */
        #mission-clock {
            color: var(--ios-text);
            font-weight: 700;
            font-feature-settings: "tnum";
            font-family: monospace;
            font-size: 18px;
        }

        /* Valore evidenziato dentro le pill */
        .pill-val { color: var(--ios-text); font-weight: 700; font-feature-settings: "tnum"; }

        /* CONTENT */
        /* Layout principale diviso in radar + cards */
        .content-split { display: grid; grid-template-columns: 420px 1fr; gap: 32px; padding: 32px; height: 100%; overflow: hidden; }

        /* RADAR */
        /* Pannello radar con orbita e pianeta centrale */
        .radar-panel { background: #E8E8ED; border-radius: var(--radius-l); position: relative; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 0 40px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5); }
        .radar-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,255,255,0.5); }
        .ring-1 { width: 300px; height: 300px; border-color: rgba(0,0,0,0.05); }

        /* Traccia circolare dell’orbita */
        .orbit-track { width: 280px; height: 280px; border-radius: 50%; border: 6px solid rgba(255,255,255,0.6); position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }

        /* Pianeta centrale stilizzato */
        .earth-3d { position: absolute; top: 50%; left: 50%; width: 80px; height: 80px; transform: translate(-50%, -50%); background: radial-gradient(circle at 30% 30%, #5AC8FA, #007AFF); border-radius: 50%; box-shadow: inset 0 4px 10px rgba(255,255,255,0.4), 0 10px 30px rgba(0, 122, 255, 0.3); z-index: 10; }

        /* Porzione “notte” dell’orbita */
        .night-slice { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; border-radius: 50%; filter: blur(20px); z-index: 0; background: conic-gradient(transparent 0deg 220deg, rgba(0,0,0,0.5) 220deg 320deg, transparent 320deg 360deg); }

        /* Braccio che ruota per posizionare il satellite */
        .sat-arm { position: absolute; top: 0; left: 50%; width: 0; height: 50%; transform-origin: bottom center; z-index: 20; transition: transform 1s linear; }

        /* Icona del satellite sull’orbita */
        .sat-tag { position: absolute; top: 0; left: 0; width: 36px; height: 36px; background: white; border-radius: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #1D1D1F; box-shadow: 0 2px 8px rgba(0,0,0,0.15); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Satellite attivo evidenziato */
        .sat-tag.active { background: var(--blue); color: white; transform: translate(-50%, -50%) scale(1.2); box-shadow: 0 8px 20px rgba(0, 122, 255, 0.4); z-index: 30; }

        /* CARDS */
        /* Griglia card nodi/satelliti */
        .cards-list { display: grid; grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(2, 1fr); gap: 24px; overflow-y: auto; padding: 10px; }
        .cards-list::-webkit-scrollbar { width: 0; }

        /* Card stile Apple */
        .apple-card {
            background: var(--ios-card);
            border-radius: var(--radius-m);
            padding: 32px;
            box-shadow: var(--shadow-soft);
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: border-color 0.2s;
            cursor: default;
        }

        /* Leggero effetto hover */
        .apple-card:hover {
            border-color: rgba(0, 122, 255, 0.1);
        }

        /* Card del nodo attivo */
        .apple-card.active-node { border: 2px solid rgba(0, 122, 255, 0.2); background: #F2F8FF; }

        /* Header card con nome e stato */
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .node-h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .node-sub { font-size: 13px; font-weight: 500; color: var(--ios-subtext); margin-top: 4px;}
        .status-dot { height: 10px; width: 10px; border-radius: 50%; background: var(--ios-border); }
        .active-node .status-dot { background: var(--blue); box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.15); }

        /* Meter batteria/temperatura */
        .meter-box { margin-bottom: 24px; }
        .meter-label { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; color: var(--ios-subtext); margin-bottom: 8px; }
        .meter-val { font-weight: 700; font-size: 17px; font-feature-settings: "tnum"; color: var(--ios-text); }
        .track { height: 12px; background: rgba(0,0,0,0.05); border-radius: 10px; overflow: hidden; }
        .fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }

        /* Sezione forecast */
        .forecast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding-top: 20px; border-top: 1px solid rgba(0,0,0,0.05); }
        .f-item { display: flex; flex-direction: column; gap: 4px; }
        .f-head { font-size: 11px; font-weight: 700; color: #98989D; text-transform: uppercase; letter-spacing: 0.5px; }
        .f-stat { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 6px; }

        /* OVERLAYS */
        /* Overlay a schermo pieno per loader e migrazione */
        #mig-overlay, #loader-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(25px); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }

        /* Box centrale migrazione */
        .mig-box { background: white; padding: 40px; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); text-align: center; border: 1px solid rgba(0,0,0,0.05); min-width: 320px; }

        /* Spinner animato */
        .loader-spinner { width: 40px; height: 40px; border: 4px solid #E5E5EA; border-top: 4px solid var(--blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Overlay iniziale di caricamento -->
    <div id="loader-overlay" style="display:flex;">
        <div class="loader-spinner"></div>
        <div style="font-weight:600; color:var(--ios-subtext);">ACQUIRING SIGNAL...</div>
    </div>

    <!-- Overlay mostrato durante la migrazione -->
    <div id="mig-overlay">
        <div class="mig-box">
            <div style="font-size:48px; margin-bottom:16px;">🛫</div>
            <h2 style="margin:0 0 8px 0;">Switching Satellite</h2>
            <p style="color:var(--ios-subtext); margin:0;">Handing over active memory state...</p>
        </div>
    </div>

    <!-- Header con brand e stato -->
    <header>
        <div class="brand"><span style="font-size:24px;">🛰️</span> SpaceCloud</div>
        <div class="pill-stack">
            <div class="pill"><span>ACTIVE</span><span class="pill-val" id="active-node" style="color:var(--blue)">--</span></div>
            <div class="pill"><span id="mission-clock">T+0s</span></div>
        </div>
    </header>

    <!-- Layout principale -->
    <div class="content-split">
        <!-- Pannello radar -->
        <div class="radar-panel">
            <div class="radar-ring ring-1"></div>
            <div class="orbit-track">
                <!-- Pianeta + layer satelliti dinamico -->
                <div class="earth-3d"></div> <div class="night-slice"></div> <div id="sat-layer"></div>
            </div>
            <div style="position:absolute; bottom:30px; font-size:11px; font-weight:700; color:var(--ios-subtext); letter-spacing:1px;">LIVE ORBIT TELEMETRY</div>
        </div>

        <!-- Griglia card popolata via JS -->
        <div class="cards-list" id="dashboard-content"></div>
    </div>

    <script>
        // --- CONFIGURAZIONE ---
        const REFRESH_RATE = 250;   // Frequenza refresh dati (ms)
        const FETCH_TIMEOUT = 1000; // Timeout fetch API (ms)

        // --- COLORI & UTILS ---
        // Mappa colori riutilizzabili
        const C = { blue: '#007AFF', green: '#34C759', orange: '#FF9500', red: '#FF3B30', gray: '#8E8E93' };

        // Colore batteria in base alla percentuale
        function getBatColor(v) { return v > 50 ? C.green : (v > 25 ? C.orange : C.red); }

        // Colore temperatura in base ai gradi
        function getTempColor(v) { return v < 50 ? C.blue : (v < 85 ? C.orange : C.red); }

        // Analizza trend tra valore attuale e forecast
        function getTrendAnalysis(current, forecast, type) {
            if (current === undefined || forecast === undefined) return { arrow: '-', color: C.gray };
            const delta = forecast - current;

            // Se variazione minima → stabile
            if (Math.abs(delta) < 0.1) return { arrow: '•', color: C.green };

            // Freccia su/giù
            const arrow = delta >= 0 ? '↗' : '↘';
            let color = C.gray;

            // Logica colori diversa per temperatura e batteria
            if (type === 'temp') {
                if (current < 0 && delta > 0) color = C.green;
                else if (current > 50 && delta < 0) color = C.green;
                else if (current < 10 && delta < 0) color = C.blue;
                else if (current > 40 && delta > 0) color = C.red;
            } else if (type === 'bat') {
                if (delta > 0) color = C.green;
                else if (current < 30 && delta < 0) color = C.red;
            }
            return { arrow, color };
        }

        // --- CORE LOGIC ---
        let hasConnectedOnce = false; // Indica se almeno una fetch è andata a buon fine

        // Loop principale: fetch dati + update UI
        async function masterLoop() {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);

            try {
                // Chiamata API con cache-buster timestamp
                const res = await fetch(`/api/telemetry?t=${Date.now()}`, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (!res.ok) throw new Error("Server Error");
                const data = await res.json();

                hasConnectedOnce = true;

                // Se server in flight mode → UI migrazione
                if (data.flight_mode === true) {
                    showMigrationUI();
                } else {
                    // Altrimenti UI normale + update dati
                    showOrbitUI();
                    updateDashboard(data);
                }

            } catch (e) {
                // Se mai connesso → loader, altrimenti migrazione
                if (!hasConnectedOnce) {
                    document.getElementById('loader-overlay').style.display = 'flex';
                    document.getElementById('mig-overlay').style.display = 'none';
                } else {
                    showMigrationUI();
                }
            }

            // Riesegue il loop dopo REFRESH_RATE
            setTimeout(masterLoop, REFRESH_RATE);
        }

        // Mostra overlay migrazione
        function showMigrationUI() {
            const mig = document.getElementById('mig-overlay');
            const load = document.getElementById('loader-overlay');
            if (mig.style.display !== 'flex') mig.style.display = 'flex';
            load.style.display = 'none';
        }

        // Mostra UI normale orbita
        function showOrbitUI() {
            const mig = document.getElementById('mig-overlay');
            const load = document.getElementById('loader-overlay');
            if (mig.style.display !== 'none') mig.style.display = 'none';
            load.style.display = 'none';
        }

        // Aggiorna elementi dashboard principali
        function updateDashboard(data) {
            // Aggiorna timer missione
            document.getElementById('mission-clock').innerText = `T+${data.internal_state.mission_timer}s`;

            // Se presenti dati ambiente → render fleet
            if (data.environment && data.environment.status !== "NO_DATA") {
                renderFleet(data.environment);
            }
        }

        // Render di tutti i nodi/satelliti
        function renderFleet(fleet) {
            const grid = document.getElementById('dashboard-content');
            const orbit = document.getElementById('sat-layer');

            // Reset contenuto precedente
            grid.innerHTML = ''; orbit.innerHTML = '';

            let activeName = "Scanning..."; // Nome nodo attivo

            // Itera nodi ordinati per nome
            Object.keys(fleet).sort().forEach(name => {
                const sat = fleet[name];
                if (typeof sat !== 'object') return;

                const active = sat.is_working;
                if(active) activeName = name;

                // Se non è ground → disegna su orbita
                if(sat.type !== 'ground') {
                    const arm = document.createElement('div');
                    arm.className = 'sat-arm';
                    arm.style.transform = `rotate(${sat.angle}deg)`;

                    const tag = document.createElement('div');
                    tag.className = `sat-tag ${active ? 'active' : ''}`;
                    tag.innerText = name.split('-').pop().replace('m','');

                    arm.appendChild(tag);
                    orbit.appendChild(arm);
                }

                // Valori forecast
                const batVal = sat.forecast?.bat_60s;
                const tempVal = sat.forecast?.temp_60s;

                // Analisi trend
                const batTrend = getTrendAnalysis(sat.battery, batVal, 'bat');
                const tempTrend = getTrendAnalysis(sat.temp, tempVal, 'temp');

                // Template HTML card
                const html = `
                <div class="apple-card ${active ? 'active-node' : ''}">
                    <div class="card-header">
                        <div>
                            <div class="node-h1">${name}</div>
                            <div class="node-sub">${sat.type === 'ground' ? 'Ground Control' : (sat.eclipse ? 'Dark Side 🌑' : 'Sunlight ☀️')}</div>
                        </div>
                        <div class="status-dot"></div>
                    </div>
                    <div class="meter-box">
                        <div class="meter-label"><span>Battery</span><span class="meter-val" style="color:${getBatColor(sat.battery)}">${sat.battery.toFixed(0)}%</span></div>
                        <div class="track"><div class="fill" style="width:${sat.battery}%; background:${getBatColor(sat.battery)}"></div></div>
                    </div>
                    <div class="meter-box">
                        <div class="meter-label"><span>Core Temp</span><span class="meter-val" style="color:${getTempColor(sat.temp)}">${sat.temp.toFixed(0)}°C</span></div>
                        <div class="track"><div class="fill" style="width:${Math.min(100, Math.max(0, (sat.temp+50)/1.5))}%; background:${getTempColor(sat.temp)}"></div></div>
                    </div>
                    <div class="forecast-grid">
                        <div class="f-item"><span class="f-head">60s Power</span><span class="f-stat" style="color:${batTrend.color}">${batTrend.arrow} ${batVal !== undefined ? batVal + '%' : '--'}</span></div>
                        <div class="f-item"><span class="f-head">60s Thermal</span><span class="f-stat" style="color:${tempTrend.color}">${tempTrend.arrow} ${tempVal !== undefined ? tempVal + '°' : '--'}</span></div>
                    </div>
                </div>`;

                // Inserisce la card nella griglia
                grid.insertAdjacentHTML('beforeend', html);
            });

            // Aggiorna nome nodo attivo in header
            document.getElementById('active-node').innerText = activeName;
        }

        // Avvio loop principale
        masterLoop();
    </script>
</body>
</html>
