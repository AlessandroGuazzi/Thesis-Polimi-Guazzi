# =============================================================================
#  SPACE CLOUD V5.2 - DISTRIBUTED NODE AGENT & RBAC
#  Description:
#  This manifest handles the deployment of the 'Agent' on every satellite.
#  It is divided into two sections:
#  1. RBAC: The "security clearance" allowing the agent to manipulate
#     the cluster (scale deployments, exec into pods, etc.).
#  2. DaemonSet: Ensures that exactly one Agent instance runs on every
#     node labeled 'satellite'.
# =============================================================================

# --- 1. PERMISSIONS (RBAC) - The Agent's Security Clearance ---
# We define a ServiceAccount, a Role, and a Binding. This is what allows
# the Python script in node_agent.py to call 'kubectl patch' or 'kubectl exec'
# without being blocked by Kubernetes security.

apiVersion: v1
kind: ServiceAccount
metadata:
  name: space-agent-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: space-agent-role
rules:
- apiGroups: ["", "apps"]
  # Resources the agent must control to perform P2P migration
  resources: ["pods", "pods/exec", "deployments", "deployments/scale", "nodes", "nodes/proxy"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: space-agent-binding
subjects:
- kind: ServiceAccount
  name: space-agent-sa
  namespace: default
roleRef:
  kind: ClusterRole
  name: space-agent-role
  apiGroup: rbac.authorization.k8s.io

# --- 2. THE DAEMONSET - Fleet-wide Deployment ---
# Unlike a Deployment, a DaemonSet automatically scales with the cluster:
# if you add a new satellite node, a new Agent is born there automatically.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: space-node-agent
  labels:
    app: space-node-agent
spec:
  selector:
    matchLabels:
      app: space-node-agent
  template:
    metadata:
      labels:
        app: space-node-agent
    spec:
      # Attaches the security clearance defined above to the pod
      serviceAccountName: space-agent-sa

      # HIGH PRIVILEGE NETWORKING:
      # Allows the agent to see the node's real IP for P2P gRPC streaming
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet

      nodeSelector:
        type: satellite

      containers:
      - name: agent
        image: localhost/space-node-agent:latest
        imagePullPolicy: Never

        securityContext:
          # Required for Buildah to commit new images locally
          privileged: true

        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # Internal DNS resolution to find the Ground Station Redis broker
        - name: REDIS_HOST
          value: "system-redis"

        # === DIRECT SYSTEM ACCESS ===
        # The agent needs to talk to the local container engine and kubelet
        # to manage the .tar memory dumps.
        volumeMounts:
        - name: containers-storage
          mountPath: /var/lib/containers # Where Buildah stores layers
        - name: kubelet-dir
          mountPath: /var/lib/kubelet    # Where CRIU checkpoints are stored
        - name: run-dir
          mountPath: /run                # Required for container runtime sockets

      volumes:
      - name: containers-storage
        hostPath: { path: /var/lib/containers }
      - name: kubelet-dir
        hostPath: { path: /var/lib/kubelet }
      - name: run-dir
        hostPath: { path: /run }