<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Cloud V3 | Mesh Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Palette V3 - Deep Space Mesh */
            --bg-deep: #020408;
            --surface: rgba(10, 20, 35, 0.85);
            --border: rgba(0, 243, 255, 0.2);
            
            --primary: #00f3ff;       /* Ciano - Compute/Link */
            --memory: #bd00ff;        /* Viola - Memory/Redis */
            --success: #00ff9d;       /* Verde - Healthy */
            --warning: #ffb800;       /* Giallo - Low Batt/Sun */
            --danger: #ff0055;        /* Rosso - Critical/Fault */
            --text-main: #ffffff;
            --text-dim: #647b94;
        }

        body { 
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Barlow', sans-serif;
            margin: 0; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
            
            /* Griglia Tattica Sfondo */
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .dashboard-wrapper { 
            display: flex; gap: 20px; z-index: 10; padding: 20px; 
            backdrop-filter: blur(5px);
            max-width: 1200px;
        }

        .col { display: flex; flex-direction: column; gap: 20px; }

        /* --- CARD SYSTEM --- */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 25px; 
            width: 380px; 
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.5;
        }

        h1 { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 16px; 
            letter-spacing: 3px; 
            color: var(--text-dim); 
            margin: 0 0 20px 0; 
            text-transform: uppercase; 
            display: flex; align-items: center; justify-content: space-between;
        }
        
        /* --- METRICS & DATA --- */
        .metric-big { 
            font-family: 'Rajdhani', sans-serif; 
            font-size: 56px; font-weight: 600; 
            color: var(--text-main); 
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }
        
        .label { 
            font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; 
            text-transform: uppercase; font-weight: 600; margin-bottom: 4px;
        }

        /* --- ORBIT VISUALIZATION (RADAR) --- */
        .orbit-container {
            width: 260px; height: 260px; margin: 10px auto; position: relative;
            border-radius: 50%; 
            border: 1px dashed rgba(255, 255, 255, 0.1);
            background: radial-gradient(circle, transparent 60%, rgba(0, 243, 255, 0.02) 70%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .earth {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; border-radius: 50%;
            background: #081224; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            z-index: 1; box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }
        .earth::after { content: "EARTH"; font-family: 'Rajdhani'; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }

        .orbit-shadow {
            position: absolute; top: 0; left: 50%; width: 50%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%);
            border-radius: 0 130px 130px 0; pointer-events: none; z-index: 0;
        }

        .sat-dot {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            transition: transform 1.2s linear; z-index: 2;
        }

        .dot-body {
            width: 12px; height: 12px; background: #fff; border-radius: 50%;
            margin: -6px auto 0; position: relative;
            box-shadow: 0 0 10px currentColor;
        }

        /* --- FLEET LIST --- */
        .fleet-container { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        
        .sat-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; border-radius: 6px;
            background: rgba(255,255,255,0.03); 
            border-left: 3px solid transparent;
            transition: all 0.3s;
        }
        
        /* Highlighting Logic */
        .sat-row.is-compute { border-color: var(--primary); background: rgba(0, 243, 255, 0.05); }
        .sat-row.is-memory { border-color: var(--memory); background: rgba(189, 0, 255, 0.05); }
        .sat-row.is-fault { border-color: var(--danger); background: rgba(255, 0, 85, 0.1); }

        .badge { 
            font-size: 9px; padding: 3px 6px; border-radius: 3px; 
            font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-right: 5px;
        }
        .bg-sun { color: var(--warning); border: 1px solid var(--warning); }
        .bg-ecl { color: var(--text-dim); border: 1px solid var(--text-dim); }
        
        .badge-role { color: #000; font-weight: 800; border: none; }
        .role-compute { background: var(--primary); }
        .role-memory { background: var(--memory); color: #fff; }
        .role-idle { background: var(--text-dim); color: #fff; }
        .role-master { background: #ffd700; color: #000; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .sat-row.is-master { border-color: #ffd700; background: rgba(255, 215, 0, 0.05); }

        .batt-val { font-family: 'Rajdhani'; font-size: 16px; font-weight: 700; text-align: right; }
        
        /* --- DB INFO --- */
        .db-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.1);
        }
        .db-status { font-family: 'Rajdhani'; color: var(--success); font-weight: 700; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        
        <div class="col">
            <div class="card">
                <h1>
                    <span>Mission Control</span>
                    <span style="font-size:10px; color:var(--success);">● LIVE</span>
                </h1>
                
                <div style="display:flex; justify-content:space-between; margin-bottom: 20px;">
                    <div>
                        <div class="label">GLOBAL COUNTER</div>
                        <div class="metric-big" id="data-counter" style="color:var(--primary)">---</div>
                    </div>
                    <div style="text-align:right">
                        <div class="label">ACTIVE REPLICAS</div>
                        <div class="metric-big" id="replica-count">1</div>
                    </div>
                </div>

                <div class="label">CURRENT CONNECTION</div>
                <div id="pod-name" style="font-family:'Rajdhani'; font-size:18px; color:var(--text-main); margin-bottom:5px;">
                    ESTABLISHING LINK...
                </div>
                <div id="memory-mode" style="font-size:11px; color:var(--text-dim);">
                    Protocol: UNKNOWN
                </div>
            </div>

            <div class="card">
                <h1>Orbital Topology</h1>
                <div class="orbit-container">
                    <div class="orbit-shadow"></div>
                    <div class="earth"></div>
                    <div id="orbit-layer"></div>
                </div>
                <div style="text-align: center; margin-top:10px; font-size:10px; color:var(--text-dim);">
                    PHYSICS SIMULATION V3
                </div>
            </div>
        </div>

        <div class="col">
            <div class="card" style="height: 100%;">
                <h1>
                    <span>Fleet Telemetry</span>
                    <span id="fleet-count" style="font-size:12px; color:var(--primary)">0 NODES</span>
                </h1>
                
                <div class="fleet-container" id="fleet-list">
                    </div>

                <div class="db-info">
                    <div>
                        <div class="label">MEMORY SYSTEM</div>
                        <div class="db-status">REDIS MESH ACTIVE</div>
                    </div>
                    <div style="text-align:right">
                        <div class="label">CONSENSUS</div>
                        <div style="color:var(--text-main); font-size:12px;">SENTINEL QUORUM</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const counterEl = document.getElementById('data-counter');
        const replicaEl = document.getElementById('replica-count');
        const podEl = document.getElementById('pod-name');
        const memModeEl = document.getElementById('memory-mode');
        const fleetList = document.getElementById('fleet-list');
        const fleetCount = document.getElementById('fleet-count');
        const orbitLayer = document.getElementById('orbit-layer');

        async function updateTelemetry() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                // 1. Aggiorna Dati Generali
                counterEl.innerText = data.count;
                
                if (data.mission_control) {
                    replicaEl.innerText = data.mission_control.replicas;
                    // Se siamo in Safe Mode (0 repliche), testo rosso
                    if(data.mission_control.replicas == "0") replicaEl.style.color = "var(--danger)";
                    else replicaEl.style.color = "var(--text-main)";
                }

                podEl.innerText = `LINK: ${data.satellite_pod}`;
                memModeEl.innerText = `Protocol: ${data.memory_mode || 'DIRECT'}`;

                // 2. Render Flotta (Satelliti)
                fleetList.innerHTML = '';
                orbitLayer.innerHTML = '';
                
                // Ordina per nome nodo (control-plane, worker, worker2...)
                const satNames = Object.keys(data.fleet || {}).sort();
                fleetCount.innerText = `${satNames.length} NODES ONLINE`;

                satNames.forEach((name, index) => {
                    const sat = data.fleet[name];
                    const isMyHost = (name === data.satellite_node);
                    const isFaulty = (sat.health === 'OFFLINE');
                    
                    // Determina il ruolo in base al Carico (Load)
                    // Physics V3 assegna: COMPUTE (Dashboard), MEMORY (Redis), IDLE
                    let roleClass = 'role-idle';
                    let roleLabel = 'IDLE';
                    let rowClass = '';
                    let dotColor = '#647b94'; // Grey

                    if (sat.load === 'COMPUTE') {
                        roleClass = 'role-compute';
                        roleLabel = 'DASHBOARD';
                        rowClass = 'is-compute';
                        dotColor = 'var(--primary)'; // Cyan
                    } else if (sat.load === 'MEMORY') {
                        if (sat.role === 'MASTER') {
                            roleClass = 'role-master'; // Definiremo questa classe CSS
                            roleLabel = 'DB MASTER';   // Etichetta esplicita
                            rowClass = 'is-master';    // Bordo dorato
                            dotColor = '#ffd700';      // Oro sulla mappa orbitale
                        } else {
                            roleClass = 'role-memory'; // Viola standard
                            roleLabel = 'DB REPLICA';
                            rowClass = 'is-memory';
                            dotColor = 'var(--memory)'; // Viola
                        }
                    }

                    if (isFaulty) {
                        rowClass = 'is-fault';
                        dotColor = 'var(--danger)';
                        roleLabel = 'OFFLINE';
                    }

                    // --- HTML LISTA ---
                    const rowHtml = `
                        <div class="sat-row ${rowClass}">
                            <div>
                                <div style="display:flex; align-items:center;">
                                    <div style="font-family:'Rajdhani'; font-weight:700; font-size:14px; color:#fff; margin-right:8px;">
                                        ${name.replace('space-cloud-', '').toUpperCase()}
                                    </div>
                                    ${isMyHost ? '<span style="font-size:8px; color:var(--primary); border:1px solid var(--primary); padding:1px 3px; border-radius:2px;">YOU</span>' : ''}
                                </div>
                                <div style="margin-top:6px; display:flex;">
                                    <span class="badge ${roleClass}">${roleLabel}</span>
                                    <span class="badge ${sat.phase === 'SUN' ? 'bg-sun' : 'bg-ecl'}">${sat.phase}</span>
                                </div>
                            </div>
                            <div>
                                <div class="batt-val" style="color: ${getBatteryColor(sat.battery)}">
                                    ${sat.battery.toFixed(1)}%
                                </div>
                                <div class="label" style="text-align:right; margin-top:2px;">${sat.status}</div>
                            </div>
                        </div>`;
                    fleetList.innerHTML += rowHtml;

                    // --- ORBIT VISUALIZATION ---
                    // Calcolo rotazione: orbit_pos è 0.0 -> 1.0
                    const rotation = (sat.orbit_pos * 360) + 180; 
                    
                    const dot = document.createElement('div');
                    dot.className = 'sat-dot';
                    dot.style.transform = `rotate(${rotation}deg)`;
                    
                    // Effetto Pulse se è il nodo attivo
                    let pulseEffect = isMyHost ? `box-shadow: 0 0 15px ${dotColor}; border: 1px solid #fff;` : `color: ${dotColor}`;

                    dot.innerHTML = `
                        <div class="dot-body" style="background-color: ${dotColor}; ${pulseEffect}"></div>
                    `;
                    orbitLayer.appendChild(dot);
                });

            } catch (e) {
                console.error(e);
                podEl.innerText = "SIGNAL LOST...";
                podEl.style.color = "var(--danger)";
            }
        }

        function getBatteryColor(val) {
            if (val < 20) return "var(--danger)";
            if (val < 40) return "var(--warning)";
            return "var(--success)";
        }

        setInterval(updateTelemetry, 1000);
        updateTelemetry();
    </script>
</body>
</html>
