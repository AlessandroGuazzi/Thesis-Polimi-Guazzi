# =============================================================================
#  SPACE CLOUD V7 - KUBERNETES MISSION DEPLOYMENT (Dual-Container Pod)
#  Description:
#  Orchestrates the 'sidecar-guardian' (stateful, CRIU-migratable) and the
#  'payload-phoenix' (ONNX Data-Level Fusion Worker) in the same pod.
#
#  CRIU MIGRATION SCOPE:
#   - ONLY the 'sidecar-guardian' container is checkpointed by CRIU.
#   - The 'payload-phoenix' worker is killed during migration and cold-restarted
#     from its original container image on the destination node.
#   - The worker recovers temporal context from the Guardian via GET /state/history.
#
#  Key changes from V6:
#   - Payload is strictly STATELESS (Zero memory retention).
#   - Port 5005/UDP added for 120-channel telemetry ingestion.
#   - Heavy historical buffers shifted to Earth Ground Station.
#   - Added strict Resource Quotas for Guardian to prevent Noisy Neighbor.
#   - Guardian pre-freeze pruning strips ephemeral masks before CRIU checkpoint.
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-mission
  labels:
    app: space-mission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-mission
  template:
    metadata:
      labels:
        app: space-mission
    spec:
      # === ORBITAL CONSTRAINT ===
      nodeSelector:
        type: satellite

      # === PROCESS NAMESPACE ISOLATION (Change 3.1) ===
      # Explicit declaration that containers do NOT share a process namespace.
      # This is the K8s default, but is set explicitly to document the CRIU
      # isolation boundary: the Guardian's PID namespace is checkpointed
      # independently — CRIU never walks the worker's process tree.
      shareProcessNamespace: false

      # === PHASE 1: QoS PREVENTION (SOFT ANTI-AFFINITY) ===
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - topology-master
                topologyKey: kubernetes.io/hostname

      # === CRIU PERSISTENCE LAYER ===
      volumes:
        - name: checkpoint-storage
          hostPath:
            path: /var/lib/kubelet/checkpoints
            type: DirectoryOrCreate
        - name: ipc-storage
          hostPath:
            path: /var/lib/space_cloud
            type: DirectoryOrCreate

      containers:
        # -----------------------------------------------------------
        # 1. THE GUARDIAN (Stateful Sidecar)
        # This container is CRIU-frozen and migrated between satellites.
        # It holds the lightweight metrics (fire mask, CoM) in RAM.
        # -----------------------------------------------------------
        - name: sidecar-guardian
          image: localhost/space-sidecar:latest
          imagePullPolicy: Never

          ports:
            - containerPort: 80
              name: dashboard

          env:
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            - name: NODE_OPTIONS
              value: "--expose-gc"

          # === CRITICAL: ELEVATED PRIVILEGES FOR CRIU ===
          securityContext:
            privileged: true
            appArmorProfile:
              type: Unconfined

          volumeMounts:
            - name: checkpoint-storage
              mountPath: /var/lib/kubelet/checkpoints
            - name: ipc-storage
              mountPath: /tmp

          # === RESOURCE QUOTAS (ADDED FOR V7) ===
          # Prevents Node.js from becoming a Noisy Neighbor on the Edge node.
          resources:
            requests:
              cpu: "50m"
              memory: "256Mi"
            limits:
              cpu: "200m"
              memory: "512Mi"

        # -----------------------------------------------------------
        # 2. PHOENIX (Stateless Worker — ONNX CNN)
        # NOTE: This container is NOT migrated via CRIU. It is killed
        # during migration and cold-restarted from its original image
        # on the destination node. It recovers temporal context from
        # the Guardian via GET /state/history on each inference frame.
        # -----------------------------------------------------------
        - name: payload-phoenix
          image: localhost/space-workload:latest
          imagePullPolicy: Never

          ports:
            # UDP 5005 is the entry point for the 120-channel tensor from Earth
            - containerPort: 5005
              protocol: UDP
              name: telemetry

          env:
            - name: STATE_ENDPOINT
              value: "http://localhost:80"
            # Campaign Mode toggle (Phase 2, Step 2.4)
            # When set to "True", the worker bypasses UDP/inference and idles
            # with a fully loaded ONNX model for deterministic memory footprint.
            - name: CAMPAIGN_MODE
              value: "False"

          # === RESOURCE QUOTAS ===
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "512Mi"
