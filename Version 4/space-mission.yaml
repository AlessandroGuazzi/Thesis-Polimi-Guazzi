apiVersion: v1
kind: Service
metadata:
  name: space-mission-service
spec:
  type: ClusterIP
  selector:
    app: space-app
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: space-mission
  labels:
    app: space-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: space-app
  template:
    metadata:
      labels:
        app: space-app 
        mission: v2-mpc
        # IMPORTANTE PER LO SCRIPT PYTHON
        scheduler: space-scheduler
      annotations:
        # --- NUCLEAR OPTION: Disabilita Seccomp e AppArmor via Annotazioni ---
        container.apparmor.security.beta.kubernetes.io/main-app: unconfined
        seccomp.security.alpha.kubernetes.io/pod: unconfined
    spec:
      # --- PUNTO CRITICO: STOP ALLO SCHEDULER DEFAULT ---
      schedulerName: space-scheduler
      # --------------------------------------------------

      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"

      containers:
      - name: main-app
        image: space-dashboard:v2
        imagePullPolicy: Never
        
        # Blocco permessi per congelare il processo con ptrace, bypassando Seccomp.
        # (Secure Computing Mode, un firewall per le chiamate di sistema del Kernel Linux)
        securityContext:
          privileged: true
          allowPrivilegeEscalation: true
          runAsUser: 0
          seccompProfile:
            type: Unconfined
          capabilities:
            add: ["SYS_ADMIN", "SYS_PTRACE", "ALL"]
        
        env:
        - name: REDIS_HOST
          value: "localhost"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - containerPort: 3000
        resources:
          requests: { memory: "64Mi", cpu: "100m" }
          limits: { memory: "128Mi", cpu: "200m" }

      - name: memory-unit
        image: redis:alpine
        ports:
        - containerPort: 6379
        resources:
          requests: { memory: "32Mi", cpu: "50m" }
          limits: { memory: "64Mi", cpu: "100m" }